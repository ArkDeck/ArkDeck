policy: ARKDECK-TRUST-1.0.0
revision: 1
status: unconfigured
execution_gate: closed
bootstrap_root_id: null
ratification:
  approval_ref: null

external_verifiers: []

rules:
  - A repository-local file or status field never proves human approval.
  - The bootstrap trust-root bundle is injected by protected CI or the host from outside the repository; this policy cannot designate the root that approves itself.
  - A trusted verifier executable must be outside the repository, executable, and match both the externally rooted bundle and this protected policy.
  - The verifier receives an approval attestation path and exact subject path and returns zero only after checking the external protected review, signature, or approval-system receipt.
  - A protected claim-service verifier separately proves atomic claim ownership, canonical host resource resolution and `changeSupersessionBarrier`; it may attest only `taskClaim`/`taskRunLease`/`resourceIdentitySet`/`changeSupersessionBarrier` and cannot approve product behavior, evidence, lab dispatch, a successor Change or a done result.
  - The protected change-approval workflow and claim service use one serializable lineage-eligibility barrier. For `changeSupersessionBarrier`, the verifier must query the service's immutable ledger, prove that the signed inventory is the complete claim set for the predecessor, prove every listed lease has its exact owner-attested terminal run, and verify the ledger revision plus globally monotonic lineage sequence. Repository timestamps or an omitted sidecar never substitute for this proof.
  - When this policy gate is open, protected CI must inject `ARKDECK_IDENTITY_LEDGER_SNAPSHOT` as an absolute read-only path outside the repository. Its independently verified, append-only inventory must exactly equal every current immutable Task/claim/run/attestation/approval/approved subject/change/archive/evidence/release/baseline identity; a prior ledger entry may never disappear or map to different bytes. Git history or the current tree alone is not this proof.
  - The service closes predecessor claim eligibility when it signs the barrier; the successor Change approval must bind the preallocated barrier ID through its locked proposal and occur strictly after `closedAt`, without allowing the claim service to decide whether successor behavior should be approved.
  - Release/verification CI supplies ARKDECK_EVALUATION_TIME from its protected clock; a developer-chosen local value is diagnostic only and cannot authorize a support claim.
  - A PCE `evidence` approval signs the standalone canonical binding record, not the raw artifact hash alone. Its verifier must inspect the controlled-external artifact and verify exact artifact hash/location/classification plus Core/Conformance/implementation and explicit case/Port/support-cell bindings before approving.
  - Until at least one verifier is configured and this policy is itself protected and human-ratified, no Task may become ready and no baseline/platform lock may become accepted.

bootstrap_note: >-
  Governance bootstrap is a separately authorized operation. It installs the
  external verifier/trust root and protected CI, then submits this candidate
  policy and baseline for human ratification; an Agent cannot self-approve it.
