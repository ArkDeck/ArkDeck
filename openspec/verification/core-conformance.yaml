fixture_policy:
  status: notImplemented
  rule: >-
    A case whose minimum evidence is parserGolden cannot pass until every fixture
    it uses is versioned and hash-pinned here through an approved integration change.
    Empty fixture inputs never mean pass.

evidence_policy:
  source: openspec/verification/acceptance-cases.yaml
  classes: [contract, parserGolden, platform, realHardware]
  simulation_and_fake_are_classified: true
  simulation_satisfies_hardware_claim: false
  real_hardware_required:
    - AC-FLASH-014-01
  hardware_claim_rule: >-
    Any real-device support statement additionally requires a matching, unexpired
    hardware-evidence record for device, firmware, HDC, transport, privilege and
    Provider, produced by a human operator (see governance/enforcement.md).

