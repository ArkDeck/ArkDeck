suite: CORE-CONFORMANCE-1.0.0
status: accepted  # 随 CORE-1.0.0 ratification;单一事实源为 openspec/baselines/CORE-1.0.0.yaml
core_baseline: CORE-1.0.0

acceptance_index:
  path: openspec/verification/acceptance-index.txt
  count: 110
  selector: all-current-core-acceptance-ids

acceptance_cases:
  path: openspec/verification/acceptance-cases.yaml
  count: 110
  expected_result: normative-scenario-then-and-clauses

applicability:
  default_platforms: [macos, windows, linux]
  platform_overrides: []
  rule: >-
    A platform may add stronger platform tests but may not remove an acceptance ID,
    change its expected result, or declare it not applicable. Any applicability
    change requires a Core change and a new conformance-suite version. Inclusion
    here is a target obligation, not a support claim; only a verified/releasable
    Platform Profile may be advertised.

shared_inputs:
  integration_lock:
    id: INTEGRATION-PROFILES-0.2.0
    path: openspec/integrations/INTEGRATION-PROFILES.lock.yaml
  integration_profiles:
    - id: OPENHARMONY-TOOLS
      version: 0.1.0
      path: openspec/integrations/openharmony/profile.md
  catalogs:
    - path: openspec/contracts/catalogs/remote-operations.yaml
      version: 1.0.0
    - path: openspec/contracts/catalogs/dump-recipes.yaml
      version: 1.0.0
    - path: openspec/contracts/catalogs/trace-presets.yaml
      version: 1.0.0
    - path: openspec/contracts/catalogs/debug-parameters.yaml
      version: 1.0.0
  contracts:
    - path: openspec/contracts/provider-contracts.md
      version: 1.0.0
    - path: openspec/contracts/workflow-step.schema.json
      version: 1.0.0
    - path: openspec/contracts/workflow-step-registry.yaml
      version: 1.0.0
    - path: openspec/contracts/manifest.schema.json
      version: 1.0.0
    - path: openspec/contracts/journal-event.schema.json
      version: 1.0.0
  fixtures: []

fixture_policy:
  status: notImplemented
  rule: >-
    A case whose minimum evidence is parserGolden cannot pass until every fixture
    it uses is versioned and hash-pinned here through an approved integration change.
    Empty fixture inputs never mean pass.

evidence_policy:
  source: openspec/verification/acceptance-cases.yaml
  classes: [contract, parserGolden, platform, realHardware]
  simulation_and_fake_are_classified: true
  simulation_satisfies_hardware_claim: false
  real_hardware_required:
    - AC-FLASH-014-01
  hardware_claim_rule: >-
    Any real-device support statement additionally requires a matching, unexpired
    hardware-evidence record for device, firmware, HDC, transport, privilege and
    Provider, produced by a human operator (see governance/enforcement.md).

safety_coverage:
  - invariants: [POL-HDC-001]
    requirements: [REQ-HDC-002, REQ-HDC-003, REQ-HDC-010]
    normal:
      - AC-HDC-003-02
      - AC-HDC-010-02
    refusal_or_failure:
      - AC-HDC-003-01
      - AC-HDC-010-01
      - AC-HDC-010-03
    recovery_or_restart:
      - AC-HDC-002-01

  - invariants: [POL-TARGET-001]
    requirements:
      - REQ-HDC-008
      - REQ-DEV-001
      - REQ-DEV-002
      - REQ-DEV-003
      - REQ-DEV-004
      - REQ-DEV-005
      - REQ-DEV-006
    normal:
      - AC-DEV-001-01
      - AC-DEV-002-01
      - AC-DEV-002-02
      - AC-DEV-003-01
    refusal_or_failure:
      - AC-HDC-008-01
      - AC-DEV-003-02
      - AC-DEV-006-01
    recovery_or_restart:
      - AC-DEV-004-01
      - AC-DEV-005-01
      - AC-FLASH-010-01

  - invariants: [POL-WORKFLOW-001, POL-RECOVERY-001]
    requirements:
      - REQ-WF-001
      - REQ-WF-002
      - REQ-JOB-001
      - REQ-JOB-002
      - REQ-JOB-003
      - REQ-JOB-006
      - REQ-JOB-007
    normal:
      - AC-WF-001-01
      - AC-WF-002-01
      - AC-JOB-001-01
      - AC-JOB-001-06
    refusal_or_failure:
      - AC-JOB-001-02
      - AC-JOB-001-04
      - AC-JOB-002-01
      - AC-JOB-003-01
    recovery_or_restart:
      - AC-JOB-001-03
      - AC-JOB-001-05
      - AC-JOB-006-01
      - AC-JOB-007-01
      - AC-JOB-007-02

  - invariants: [POL-MODE-001]
    requirements: [REQ-ART-004, REQ-FLASH-004, REQ-FLASH-005, REQ-FLASH-006]
    normal:
      - AC-FLASH-004-01
      - AC-FLASH-005-01
      - AC-FLASH-006-01
      - AC-ART-004-01
    refusal_or_failure:
      - AC-FLASH-005-02
    recovery_or_restart:
      not_applicable_reason: >-
        Mode identity is immutable persisted data; restart behavior is exercised by
        AC-ART-004-01 and no mode transition is permitted during recovery.

  - invariants: [POL-STORAGE-001, POL-ARTIFACT-001]
    requirements:
      - REQ-ART-002
      - REQ-ART-003
      - REQ-STO-001
      - REQ-STO-002
      - REQ-STO-003
      - REQ-STO-004
      - REQ-STO-005
    normal:
      - AC-ART-002-01
      - AC-STO-001-01
      - AC-STO-003-01
    refusal_or_failure:
      - AC-STO-002-01
      - AC-STO-004-01
    recovery_or_restart:
      - AC-ART-003-01
      - AC-STO-005-01

  - invariants: [POL-SAFETY-001]
    requirements:
      - REQ-FLASH-002
      - REQ-FLASH-003
      - REQ-FLASH-007
      - REQ-FLASH-008
      - REQ-FLASH-009
      - REQ-FLASH-010
      - REQ-FLASH-012
      - REQ-FLASH-013
      - REQ-FLASH-014
      - REQ-UX-007
    normal:
      - AC-FLASH-002-01
      - AC-FLASH-003-01
      - AC-FLASH-007-01
      - AC-FLASH-014-01
    refusal_or_failure:
      - AC-FLASH-008-01
      - AC-FLASH-012-01
      - AC-UX-007-01
    recovery_or_restart:
      - AC-FLASH-009-01
      - AC-FLASH-010-01
      - AC-FLASH-013-01

  - invariants: [POL-PRIVACY-001]
    requirements: [REQ-ART-006, REQ-DUMP-008, REQ-DIAG-001, REQ-DIAG-002]
    normal:
      - AC-ART-006-01
      - AC-ART-006-02
      - AC-DUMP-008-01
      - AC-DIAG-001-01
      - AC-DIAG-001-02
    refusal_or_failure:
      - AC-DIAG-002-01
    recovery_or_restart:
      not_applicable_reason: >-
        This invariant prohibits automatic upload and controls explicit export;
        it has no state-machine recovery transition.

  - invariants: [POL-AGENT-002]
    requirements: [REQ-FLASH-005, REQ-FLASH-006, REQ-FLASH-015]
    normal:
      - AC-FLASH-005-01
      - AC-FLASH-006-01
    refusal_or_failure:
      - AC-FLASH-015-01
      - AC-FLASH-015-02
    recovery_or_restart:
      not_applicable_reason: >-
        The standard Agent/CI gate blocks before destructive dispatch and hands
        off to human execution; no device-side recovery is created.
