files: []

# At archive time `files` is the exact, path-sorted set of every regular file in
# this archive directory except archive-lock.yaml. `pre_archive_verification`
# was produced against source_tree_revision and externally approved before the move.
# verification_revision cannot contain verification-result.json because that file
# names the earlier commit; source_tree_revision adds exactly that finalized record
# plus the already-issued verification approval mirror. The later staging commit
# adds the pre-archive record and its approval mirror while moving the Change.
# A protected, non-public staging commit then applies the exact delta/baseline and
# moves every file listed above, but MUST NOT contain archive-lock.yaml. Only after
# that commit exists is this lock generated; archive approval binds these exact
# lock bytes and the earlier result_revision. The lock/approval live in a descendant
# metadata commit, which may merge/publish only after every gate passes. Moving a
# directory or constructing staging alone never constitutes archive approval.
# Historical replay resolves Platform/Conformance bytes and approval refs from the
# fixed result_revision/publication history; it never substitutes the current locks.
