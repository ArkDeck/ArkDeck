  - acceptance_id: RB-020
    test_id: TEST-RB-020
    method: Credential and subject-type capability cross-use matrix.
    expected_source: openspec/planning/recovery-bootstrap/verification.md#RB-020
    source_sha256: f8f525df5facb0a56c06137f1136bec56feada03643297fbc627e374a79fb354
    minimum_evidence: controlledExternalTestReceipt
    required_evidence_origin: controlledExternal
    expected_result: >-
      Recovery root, human approval, claim, ledger and publication OIDC
