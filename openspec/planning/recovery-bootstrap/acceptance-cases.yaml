      Publication OIDC candidate/current create/read scopes also obey the exact
      pre/post-activation lifecycle matrix. Every envelope signer/payload is
      exact-bound to its governing service pin; the witness pin is fixed at
      reservation/ceremony and adopted unchanged by Gate 3.
  - acceptance_id: RB-021
    test_id: TEST-RB-021
    method: Global recovery-lineage single-use concurrency test.
    expected_source: openspec/planning/recovery-bootstrap/verification.md#RB-021
    source_sha256: 53a84c0a76066c6c27f37e3bdd11368600c1a5485957747576b9f62f13cd4aa3
    minimum_evidence: controlledExternalTestReceipt
    required_evidence_origin: controlledExternal
    expected_result: >-
      The independent recovery service atomically consumes the fixed repository/
      schema/recovery-epoch slot before the first external action and allocates
      lineage/authority epoch and activation sequence as values; changing those
      values, replay, clone,
      reset, concurrency or rollback of the full slot service cannot execute a
      second bootstrap because an independent slot witness preserves accepted,
      rejected and permanent-abort sequence/state transitions. Current and abort
      CAS against one expected activation head are mutually exclusive, and stale
      pre-abort objects never override the latest aborted head. Gate 3 and every
      early abort must retain the reservation/ceremony witness pin exactly.
  - acceptance_id: RB-022
    test_id: TEST-RB-022
    method: Ledger transaction crash-window and witness reconciliation matrix.
    expected_source: openspec/planning/recovery-bootstrap/verification.md#RB-022
    source_sha256: ffc20ec58acca4e052b3cbbfecc70dceee7b288c7e909bab58a7ce3abb358174
    minimum_evidence: controlledExternalTestReceipt
    required_evidence_origin: controlledExternal
    expected_result: >-
      Crashes before/after DB commit, signing, witness append, snapshot publish
      and head update create no authoritative orphan or fork; the snapshot does
      not self-reference its witness, the witness record does not hash itself,
      and only a matching published-head receipt makes the reconciled linear head
      a non-authorizing candidate component. The component-to-activation-head
      hash DAG is acyclic, and only an independently fetched latest signed current
      activation head, with every payload/signer equal to its governing role pin,
      makes its exact result bundle authoritative. Head payload, signature and
      latest pointer are one atomic visibility unit.
