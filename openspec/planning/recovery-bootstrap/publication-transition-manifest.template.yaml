schema_version: draft-1
status: templateNonAuthorizing
purpose: externalParentChildStageAuthorizationInput
hash_algorithm: sha256
transition: null
source_revision: null
target_revision: null
publication_plan_sha256: null
required_stage_role_cardinality_sha256: null
entries: []

allowed_transitions:
  R_to_S:
    permitted_roles:
      - governance_recovery_result_mirror
  S_to_T:
    permitted_roles:
      - recovery_prepublication_proof
      - fresh_core_baseline_lock_or_manifest
      - fresh_conformance_subject
      - fresh_platform_lock_subject
      - fresh_integration_lock_subject
      - current_config_pin
      - governance_publication_metadata
  T_to_P:
    permitted_roles:
      - exact_recovery_approval_mirror
      - exact_baseline_or_axis_approval_mirror
      - governance_publication_metadata

entry_contract:
  exact_fields:
    - path
    - operation
    - base_sha256
    - result_sha256
    - mode
    - object_type
    - publication_role
  operations:
    - add
    - replace
  path_rule: normalizedRepositoryRelativeFileWithoutGlobTraversalOrSymlink
  base_sha256_rule: nullOnlyForAddOtherwiseExactSourceCommitBlobHash
  result_sha256_rule: exactTargetCommitBlobHash
  mode_values:
    - regular_0644
    - executable_0755
  object_type: regularFileOnly

transition_rules:
  - this_template_is_not_a_recovery_lock_input
  - generate_only_after_both_isolated_source_and_target_commits_exist
  - source_and_target_are_canonical_full_commit_oids
  - target_has_exactly_one_parent_and_it_equals_source_revision
  - merge_commit_replace_parent_graft_or_additional_parent_is_failure
  - entries_equal_the_preallocated_publication_plan_paths_roles_modes_and_types
  - required_stage_role_cardinality_hash_equals_the_entire_locked_sorted_table
  - actual_role_counts_equal_exactly_table_rows_filtered_by_stage_equal_transition
  - entries_are_nonempty_sorted_and_unique_by_path
  - actual_parent_to_child_diff_equals_entries
  - no_extra_delete_rename_copy_directory_symlink_or_submodule
  - quarantined_V1_evidence_is_never_moved_replaced_or_deleted
  - every_frozen_product_and_safety_projection_is_unchanged
  - only_predeclared_mutable_json_pointers_may_change
  - external_recovery_authority_binds_the_exact_manifest_and_parent_child_oids
  - stage_authorization_binds_sha256_of_exact_manifest_utf8_lf_raw_bytes
  - restricted_yaml_parse_must_pass_before_authorization
  - explicit_snake_case_to_camel_case_mapping_must_produce_exact_signed_subject_fields
  - the_external_authorization_is_not_mirrored_into_its_target_commit

completion_rule: >-
  Null stage/OID/hash fields or empty entries always fail. A formal instance is
  generated and authorized outside the repository only after its isolated child
  commit exists. R contains only the path/role publication plan, never these
  future bytes, hashes or commit OIDs.
