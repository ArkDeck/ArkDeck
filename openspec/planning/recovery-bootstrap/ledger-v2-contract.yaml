contract: arkdeck-identity-ledger-v2-candidate
status: draftNonAuthorizing
purpose: >-
  Define a persistent, serialized, externally signed identity ledger that
  preserves the polluted V1 history while preventing every future immutable
  identity remap, rollback, fork or local signing fallback.

trust_epoch:
  old_epoch_disposition: presumedCompromisedNonAuthorizing
  recovery_authority_root: pendingOutOfBandFingerprintConfirmation
  recovery_authority_scope: recoverySubjectsOnly
  new_epoch_id: pending_external_allocation
  root_id: pending_external_allocation
  root_creation_authority: independentRecoveryAuthorityRoot
  root_self_authorization: forbidden
  root_activation: independentlyFetchedLatestRecoveryActivationHeadStateCurrentOnly
  pre_activation_state: recoveryCandidate
  pre_activation_authority: noneForNormalOperationalSubjects
  pre_activation_verifier: independentRecoveryVerifierOnly
  activation_sequence: pending_external_allocation
  required_key_classes:
    - humanApproval
    - claimService
    - identityLedger
  key_separation: mandatory
  private_key_locations_forbidden:
    - repository
    - agent_readable_filesystem
    - github_repository_secret
    - github_environment_secret_exposed_to_workflow_code
    - workflow_environment
    - ci_artifact
    - task_evidence
    - application_log
  old_key_behavior:
    signature_verification_for_forensics: allowed
    current_authorization: forbidden

recovery_checkpoint:
  ledger_id: pending_external_allocation
  ledger_revision: 1
  synthetic_v1_history_checkpoint_sequence: 0
  global_sequence: 1
  observed_candidate_predecessor_snapshot_sha256: 047f899caefb08821493c8874ac79174f39788f6c4670f72edef16942656eff4
  formal_predecessor_snapshot_sha256: pendingGate2TerminalHistoryCheckpoint
  predecessor_ledger_id: ARKDECK-LEDGER-1
  observed_candidate_predecessor_revision: 10
  formal_predecessor_revision: pendingGate2CompletenessVerification
  history_commitment_sha256: required
  incident_manifest_sha256: required
  quarantine_manifest_sha256: required
  rule: >-
    Independent recovery authority assigns the complete V1 history a synthetic
    checkpoint sequence 0. A new ledger ID starts at revision 1/globalSequence 1
    only when it binds Gate 2's externally verified terminal V1 checkpoint,
    complete legacy identity set, history commitment and permanent quarantine.
    Snapshot 10 is only the latest observation in this draft, not assumed final.

snapshot_shape:
  schema_version: 2.0.0
  subject_type: identityLedger
  required_fields:
    - schemaVersion
    - subjectType
    - ledgerId
    - trustEpoch
    - epochState
    - revision
    - globalSequence
    - previousSnapshotSha256
    - predecessorCheckpoint
    - repositoryId
    - repositoryRevision
    - generatedAt
    - currentInventory
    - activeBindings
    - legacySeenIdentities
    - quarantineTombstones
    - evidenceBlobs
    - incidentManifestSha256
    - quarantineManifestSha256
    - historyCommitmentSha256
    - requestProvenance
    - requestProvenanceReceiptSha256
    - witnessReservation
    - issuer
    - mechanism
    - verificationRef
  additional_properties: false
  field_rules:
    schemaVersion: constant_2_0_0
    subjectType: constant_identityLedger
    ledgerId: globally_unique_and_matches_IDLEDGER_pattern
    trustEpoch: exact_target_external_epochAllocatedByRecoveryAuthority
    epochState: enumRecoveryCandidateOrCurrent
    revision: positive_integer_strictly_incrementing_per_ledger
    globalSequence: positive_integer_startingAtOneAndStrictlyIncrementing
    previousSnapshotSha256: >-
      null only for the recovery checkpoint; later revisions bind the exact
      immediately preceding V2 snapshot bytes
    repositoryId: exact_trust_root_repository
    repositoryRevision: canonical_full_commit_oid
    generatedAt: audit_only_rfc3339_not_an_ordering_authority
    requestProvenance: >-
      Closed object containing tokenClaims, providerContext, workflowPolicySha256
      and providerReceiptSha256. Target commit, workflow bytes/caller chain and
      protection state come only from providerContext, never the request body.
    requestProvenanceReceiptSha256: exactExternalAuditReceiptForRequestProvenance
    witnessReservation: >-
      Exact witness service/epoch, idempotent append key and previous witness
      record hash. It never contains the current witness record or snapshot hash.
    verificationRef: basename_only_read_only_signature_locator
  epoch_state_rules:
    - recovery_checkpoint_and_preGate5_snapshots_are_recoveryCandidate
    - recoveryCandidate_is_nonAuthorizing_for_normal_operational_verifier
    - gate5_may_activate_only_the_exact_bound_candidate_snapshot_as_anchor
    - postActivation_successors_are_current_and_bind_the_activated_anchor
  authority_limit: >-
    A ledger snapshot proves identity existence, uniqueness, history continuity
    and quarantine only. It never approves subject content, a baseline, Change,
    Task, claim, run, verification, archive, release or execution gate.

request_provenance_shape:
  required_fields:
    - tokenClaims
    - providerContext
    - workflowPolicySha256
    - providerReceiptSha256
    - requestedOperationScope
  additional_properties: false
  token_claims_source: verifiedShortLivedOidcTokenOnly
  token_claims_exact_fields:
    - issuer
    - audience
    - repository
    - jobWorkflowRef
    - ref
    - environment
    - eventName
    - runId
    - runAttempt
  provider_context_source: serviceSideProviderQueryOnly
  provider_context_exact_fields:
    - providerRepositoryId
    - protectedRef
    - resolvedTargetCommit
    - applicableRulesetIdsAndVersions
    - protectedEnvironment
    - workflowPath
    - workflowCommit
    - workflowBytesSha256
    - reusableWorkflowCallerChain
    - eventName
    - runId
    - runAttempt
  requested_operation_scope_source: clientRequestOnly
  requested_operation_scope_values:
    - createRecoveryCandidateSnapshotForExactCommit
    - createCurrentSnapshotForExactCommit
    - readRecoveryCandidateComponentBundle
    - readCurrentAuthoritativeBundle
  request_body_may_supply: [requestedOperationScope]
  request_body_may_not_supply:
    - resolvedTargetCommit
    - refProtectionState
    - environmentProtectionState
    - workflowBytesSha256
    - reusableWorkflowCallerChain
  mismatch_rule: anyTokenProviderPolicyOrRequestMismatchIsRejectedAndAudited
  authorization_rule: workflowPolicyAndProviderContextMustPermitRequestedOperationScope
  capability_lifecycle_matrix:
    preGate5RecoveryCandidate:
      activation_head_state: candidate
      allowed:
        - createRecoveryCandidateSnapshotForExactCommit
        - readRecoveryCandidateComponentBundle
      required_epoch_state: recoveryCandidate
      authority_effect: none
      forbidden:
        - createCurrentSnapshotForExactCommit
        - readCurrentAuthoritativeBundle
    postLatestActivationHeadCurrent:
      activation_head_state: current
      allowed:
        - createCurrentSnapshotForExactCommit
        - readCurrentAuthoritativeBundle
      required_anchor: independentlyFetchedLatestCurrentActivationHead
    activationHeadAbortedStaleOrUnavailable:
      activation_head_state: enumAbortedStaleUnavailable
      allowed: []
    partition_rule: >-
      The three branches are mutually exclusive and exhaustive after slot
      reservation. A valid latest candidate head selects only the pre-Gate5
      branch; it is never treated as stale or unavailable merely because it is
      not current.
  scope_match_rule: >-
    Requested scope, verified token tuple, provider-derived context, externally
    pinned workflow policy, target epoch/lifecycle and service operation must
    match exactly; no broader publication capability or fallback is implied.

commitment_canonicalization:
  source: artifact-contracts.yaml#serialization
  formal_incident_source: gate2ExternallyAcceptedIncidentInventory
  formal_quarantine_source: gate2ExternallyAcceptedQuarantineManifest
  restricted_yaml_to_jcs: required
  identity_sort_key:
    - repositoryIdUtf8Bytes
    - kindAsciiBytes
    - idAsciiBytes
    - revisionInteger
  observed_hash_sort: lowercaseSha256HexByteOrder
  duplicate_identity_or_hash: rejected
  unicode_normalization: forbiddenIdsUseClosedAsciiPatterns
  numeric_encoding: nonNegativeJsonIntegerOnlyNoFloatOrExponent
  history_commitment_inputs:
    - evidenceInventoryCommitmentSha256
    - terminalV1Checkpoint
    - completeLegacyIdentitySetSha256
    - collisionGroupsSha256
    - completenessVerifierReceiptSha256
  repository_observations_role: nonAuthorizingEvidenceInputOnly

active_binding_shape:
  identity_key:
    - repositoryId
    - kind
    - id
    - revision
  required_fields:
    - kind
    - id
    - revision
    - sha256
  rule: oneIdentityKeyMapsToOneSha256ForAllTimeAndIsAbsentFromLegacyAndQuarantine

legacy_seen_identity_shape:
  identity_key:
    - repositoryId
    - kind
    - id
    - revision
  required_fields:
    - kind
    - id
    - revision
    - observedHashes
    - sourceCommitmentRefs
  observedHashes: sortedUniqueNonEmptySha256Array
  rule: >-
    Every identity observed before recovery is permanently reserved and can
    never be registered in activeBindings, even when only one hash was seen.

quarantine_tombstone_shape:
  required_fields:
    - kind
    - id
    - revision
    - reason
    - legacyIdentitySetSha256
    - incidentManifestSha256
  reasons:
    - identityCollision
    - exposedTrustEpoch
    - transitiveAuthorityDependency
  removal_or_reactivation: forbidden

evidence_blob_shape:
  required_fields:
    - sha256
    - mediaType
    - immutableLocationRef
    - sourceCommitmentRef
  identity_authority: none
  purpose: Preserve content-addressed historical bytes including multi-hash collisions.

inventory_rules:
  currentInventory:
    - equals_the_external_service_inventory_for_exact_repository_revision
    - sorted_by_identity_key
    - unique_by_identity_key
    - non_empty
    - classifies_each_item_as_active_or_legacyEvidence
  activeBindings:
    - contains_every_non_quarantined_identity_ever_registered_in_new_epoch
    - sorted_by_identity_key
    - unique_by_identity_key
    - append_only
    - same_identity_same_hash_is_idempotent
    - same_identity_different_hash_is_atomic_rejection
  legacySeenIdentities:
    - covers_all_identities_from_v1_snapshots_git_history_external_registries_ci_metadata_and_worm_evidence
    - reserves_colliding_and_non_colliding_legacy_identities
    - each_collision_preserves_all_observed_hashes
    - append_only
  quarantineTombstones:
    - exact_subset_or_transitive_closure_of_legacy_seen_identities
    - append_only
    - no_reactivation
  evidenceBlobs:
    - content_addressed
    - preserve_every_referenced_historical_hash
    - never_authorize_identity
  reference_closure:
    - active_subject_cannot_reference_quarantined_identity
    - current_inventory_deletion_does_not_remove_cumulative_binding
    - git_history_rewrite_does_not_remove_cumulative_binding

quarantine_contract:
  direct_set_source: gate2ExternallyAcceptedIncidentAndQuarantineManifest
  draft_observation_source: incident-observations.jsonIsNonAuthorizingEvidenceOnly
  known_minimum_collision_group_count: 31
  formal_collision_group_count: pendingGate2CompletenessVerification
  complete_legacy_identity_set: required
  every_legacy_identity_reuse: forbidden
  direct_identity_disposition: permanentTombstone
  old_epoch_disposition: allAuthorityNonAuthorizing
  transitive_rule: >-
    An approval, claim, run, verification, archive, release or baseline that
    derives authority from a quarantined subject is ineligible even if its own
    identity has no observed collision.
  append_only: true
  removal_or_reactivation: forbidden

service_transaction:
  isolation: serializable
  state_machine:
    prepared:
      actions:
        - verify_expected_predecessor_signature_schema_hash_head_revision_and_global_sequence
        - verify_history_quarantine_and_independent_witness_minimum
        - rebuild_exact_repository_inventory_for_providerDerivedRequestedCommit
        - reject_quarantined_authority_and_transitive_references
        - enforce_identity_unique_constraint
        - construct_and_validate_candidate_snapshot_schema
      durable_authority: none
    dbPending:
      actions:
        - reserve_revision_global_sequence_and_witness_append_key
        - persist_exact_candidate_bytes_hash_bindings_and_audit_event_atomically
      durable_authority: none
    signed:
      actions:
        - sign_exact_dbPending_snapshot_inside_service_boundary
        - persist_signature_against_same_candidate_hash
      durable_authority: noneUntilWitnessAndPublication
    witnessed:
      actions:
        - idempotently_append_snapshot_hash_to_independent_witness
        - verify_and_persist_external_witness_receipt
      durable_authority: noneUntilPublished
    published:
      actions:
        - publish_exact_snapshot_and_signature_readOnly
        - atomically_mark_same_hash_authoritative_and_advance_head
        - issue_external_published_head_receipt_for_exact_snapshot_and_witness
        - expose_authority_only_when_snapshot_signature_witness_and_head_receipts_all_match
      durable_authority: exactSingleLinearHead
  transition_order: preparedToDbPendingToSignedToWitnessedToPublishedOnly
  retry_rule: sameRevisionSequenceAppendKeyAndSnapshotHashIsIdempotent
  conflict_rule: sameRevisionSequenceOrAppendKeyWithDifferentHashIsAtomicRejection
  ambiguous_response_rule: queryExistingStateByAppendKeyAndResumeSameHashOrFailClosed
  crash_reconcile_rule: >-
    Restart may advance only the already persisted candidate hash through the
    remaining states. It may not allocate another sequence while a pending state
    exists. Signed-but-unwitnessed or witnessed-but-unpublished bytes are never
    returned as authoritative.
  concurrency_rule: >-
    Two writers using the same predecessor can produce at most one committed
    successor; every loser receives a conflict and may not overwrite or fork.
  durability:
    - persistent_across_ci_runners
    - persistent_across_service_restart
    - atomic_database_commit
    - durable_head_pointer
    - protected_backup_with_rollback_detection
    - independent_rollback_resistant_witness
  unavailable_behavior: failClosedWithoutLocalFallback

independent_witness:
  control_boundary: separateFromLedgerDatabaseHeadAndSigner
  examples:
    - appendOnlyTransparencyCheckpoint
    - WORMObjectGenerationWithExternalMinimumSequence
    - independentlyControlledMonotonicCounter
  snapshot_reservation_fields:
    - witnessServiceId
    - witnessEpoch
    - appendKey
    - expectedPreviousWitnessRecordSha256
  external_record_required_fields:
    - repositoryId
    - witnessServiceId
    - witnessEpoch
    - appendKey
    - trustEpoch
    - ledgerId
    - revision
    - globalSequence
    - snapshotSha256
    - previousWitnessRecordSha256
    - issuer
    - mechanism
    - verificationRef
  self_reference_rule: >-
    Snapshot bytes contain only the reservation and previous witness hash. After
    snapshot SHA-256 exists, the independent service creates the witness record.
    The snapshot never contains the current witness-record hash.
  idempotency_rule: >-
    Repeating one append key with the same snapshot hash returns the identical
    receipt; the same append key, revision or sequence with another hash fails.
  raw_record_hash_rule: >-
    The verifier computes SHA-256 over exact external record bytes. That hash is
    stored only by the witness head/receipt and the next record's
    previousWitnessRecordSha256; the record never contains its own hash.
  verifier_input: independentlyFetchedMinimumEpochSequenceAndCheckpoint
  rollback_rule: >-
    Rolling back the service database, head pointer, signer and backup together
    still fails because the independent witness exposes a higher committed state.
  pending_snapshot_rule: >-
    A signed or database-committed snapshot is not authoritative until the
    witness append succeeds and the service atomically marks it published.

client_and_ci_boundary:
  diagnostic_jobs:
    events: [push, pull_request, agent_branch]
    signing_secret_access: forbidden
    authoritative_snapshot_generation: forbidden
    allowed_operation: unsigned_diagnostic_guard
  protected_publication_job:
    private_key_access: forbidden
    authentication: shortLivedOidcToExternalService
    required_oidc_claims:
      - issuer
      - audience
      - repository
      - job_workflow_ref
      - ref
      - environment
      - event_name
      - run_id
      - run_attempt
    provider_context_required_fields:
      - providerRepositoryId
      - protectedRef
      - resolvedTargetCommit
      - applicableRulesetIdsAndVersions
      - protectedEnvironment
      - workflowPath
      - workflowCommit
      - workflowBytesSha256
      - reusableWorkflowCallerChain
      - eventName
      - runId
      - runAttempt
    externally_pinned_workflow_policy:
      - exactWorkflowPathAndImmutableCommit
      - exactWorkflowBytesSha256
      - exactReusableWorkflowCallerChain
    pre_request_code_rule: >-
      The service request is the first user-controlled executable step. Before
      it, there is no checkout, local action, composite action or target code;
      every provider action is pinned to an immutable commit SHA.
    target_commit_source: gitProviderProtectedRefEventNotClientRequestBody
    provider_verification: serviceQueriesProviderAndRejectsClientSuppliedTargetOrProtectionState
    audit_binding: snapshotBindsExactProviderReceiptAndOidcWorkflowAuditReceiptSha256
    service_response: readOnlyExactCommitSnapshot
  branch_controlled_code:
    install_verifier: forbidden
    select_signer: forbidden
    invoke_signing_operation: forbidden

external_verifier:
  location: outsideRepositoryAndAgentFilesystem
  pinned_by:
    preGate5: independentRecoveryAuthorityRoot
    postGate5: activatedTargetOperationalTrustRoot
  common_validates:
    - complete_json_schema_not_only_required_field_names
    - signature_target_trust_epoch_and_epoch_state
    - exact_repository_and_commit
    - previous_snapshot_signature_and_hash
    - revision_and_global_sequence_continuity
    - history_and_quarantine_commitments
    - current_inventory_exactness
    - cumulative_identity_uniqueness
    - old_epoch_and_quarantined_reference_rejection
    - issuer_and_workflow_provenance
    - request_provenance_and_independent_witness_receipt
    - exact_published_head_receipt_for_snapshot_revision_sequence_and_witness
  pre_gate5_component_phase:
    validates:
      - exactCandidateComponentPayloadCommitment
      - independentlyFetchedCurrentLedgerAndWitnessHeads
      - recoveryCandidateEpochAndActivationSequencePins
    output_contract: artifact-contracts.yaml#supporting_closed_contracts.preActivationComponentVerifierAttestation
    authority_effect: none
    gate_open_activation_requirement: forbiddenToAvoidForwardDependency
    outer_bundle_reference: forbidden
  post_activation_current_phase:
    validates:
      - independentlyFetchedLatestActivationHeadStateCurrent
      - activationHeadToResultBundleToAuthorizationToManifestHashDAG
      - exactManifestMembershipAndGateDecisions
      - currentLedgerComponentEqualsManifestPin
    current_authority_requires: latestActivationHeadAndExactResultBundle
  common_refuses:
    - repo_local_verifier
    - repo_local_trust_root
    - old_epoch_bundle_or_key
    - stale_or_future_commit
    - schema_invalid_signed_record
    - empty_inventory
    - reset_or_fork
    - signed_and_witnessed_snapshot_without_published_head_receipt
  post_activation_refuses:
    - recoveryCandidate_snapshot_without_exact_latest_current_activation_head
    - staleButValidActivationLedgerOrWitnessHead

candidate_component_bundle_contract:
  bundle_manifest_fields:
    - bundleId
    - exactSnapshotRawSha256
    - detachedSnapshotSignatureEnvelopeSha256
    - exactWitnessRecordRawSha256
    - detachedWitnessRecordSignatureEnvelopeSha256
    - publishedHeadReceiptId
    - exactPublishedHeadReceiptRawSha256
    - detachedPublishedHeadReceiptSignatureEnvelopeSha256
    - preActivationComponentVerifierAttestationIdAndSha256
    - preActivationComponentVerifierAttestationSignatureEnvelopeSha256
    - activationEligibility
  canonicalization: RFC8785JCS
  bundle_sha256: computedOverExactManifestBytesAndNeverStoredInsideManifest
  component_payload_commitment: >-
    JCS hash of the snapshot, witness and published-head component ID/raw-hash
    tuple only. The pre-activation verifier attests this commitment; the outer
    bundle then references that attestation, so no attestation or bundle cycle exists.
  component_payload_commitment_exact_projection:
    - exactSnapshotRawSha256
    - detachedSnapshotSignatureEnvelopeSha256
    - exactWitnessRecordRawSha256
    - detachedWitnessRecordSignatureEnvelopeSha256
    - publishedHeadReceiptId
    - exactPublishedHeadReceiptRawSha256
    - detachedPublishedHeadReceiptSignatureEnvelopeSha256
  component_payload_commitment_excludes:
    - preActivationComponentVerifierAttestationIdAndSha256
    - preActivationComponentVerifierAttestationSignatureEnvelopeSha256
    - bundleId
  activation_eligibility_rule: >-
    activationEligibility is eligible iff the exact referenced pre-activation
    attestation decision is passed, its detached signature and component
    commitment are valid, and its independently fetched current head/minimum
    checks pass. Otherwise it is ineligible and cannot enter a passed publication
    result, Gate 5 Ready bundle or current activation head.
  published_head_receipt_fields:
    - schemaVersion
    - receiptType
    - receiptId
    - receiptRevision
    - repositoryId
    - ledgerId
    - trustEpoch
    - revision
    - globalSequence
    - snapshotSha256
    - witnessRecordSha256
    - previousPublishedHeadReceiptSha256
    - headGeneration
    - issuer
    - mechanism
    - verificationRef
  published_head_receipt_rules:
    receiptType: constantIdentityLedgerPublishedHeadReceipt
    receiptRevision: constantIntegerOne
    self_hash: forbidden
    publication: atomicCompareAndSwap
    idempotency: sameHeadTupleReturnsSameReceiptDifferentTupleConflicts
  detached_signature_envelope_exact_fields:
    - schemaVersion
    - envelopeType
    - payloadId
    - payloadRawSha256
    - signerId
    - signerPublicFingerprint
    - mechanism
    - detachedSignatureBytes
  detached_signature_envelope_rules:
    envelopeType: closedEnumSnapshotWitnessRecordPublishedHeadReceiptSignature
    payloadIdAndRawSha256: exactReferencedPayload
    signedBytes: exactReferencedPayloadJcsBytes
    signer: >-
      Snapshot uses the exact Gate 3 identityLedgerService entry. Witness record
      and published-head receipt use the rollback-witness pin fixed at atomic slot
      reservation and confirmed by the recovery ceremony, which Gate 3 must
      exact-adopt. Envelope signer ID/fingerprint also equal payload issuer;
      self-declared, substituted or old-epoch signers are rejected.
    selfHashOrOuterBundleHash: forbidden
  verifier_attestation_signature_contract: artifact-contracts.yaml#supporting_closed_contracts.externalVerifierResultSignatureEnvelope
  rule: >-
    Snapshot readability, a valid signature or a witness record alone is never
    authority. Before Gate 5 this exact mutually consistent candidate component
    bundle and its attestation have authority effect none. After Gate 5, current
    authority additionally requires the independently fetched latest activation
    head in state current and its exact result bundle; no circular verifier input
    is permitted.

generator_retirement:
  scripts_ledger_snapshot_py:
    authoritative_signing: forbidden
    allowed_future_role: unsigned_inventory_client_or_test_fixture_only
  scripts_ratify_py:
    direct_private_key_access: forbidden
    allowed_future_role: request_builder_or_offline_test_fixture_only
  rule: >-
    A repository script may prepare bytes and submit a request, but only the
    protected external service may decide eligibility, allocate sequence and sign.

required_negative_tests:
  - same_identity_different_hash
  - delete_historical_identity
  - stale_previous_snapshot
  - skip_or_duplicate_revision
  - lower_global_sequence
  - chain_reset
  - concurrent_writer_fork
  - old_snapshot_replay
  - old_bundle_or_signer_substitution
  - repository_revision_mismatch
  - signed_but_schema_invalid_record
  - empty_entries
  - incomplete_current_inventory
  - quarantine_omission
  - transitive_quarantine_reference
  - agent_branch_signer_request
  - same_workflow_path_different_workflow_sha
  - protected_environment_with_branch_controlled_workflow
  - replaced_reusable_workflow_caller
  - client_reported_target_commit_mismatch
  - untrusted_checkout_before_service_request
  - service_timeout_or_unavailable
  - complete_service_database_head_signer_and_backup_rollback
  - signed_snapshot_without_witness_commit
  - crash_before_and_after_each_transaction_step
  - legacy_non_collision_identity_reuse
  - thirty_second_collision_discovered_after_manifest_approval
  - wrong_credential_subject_type_cross_use
  - approval_claim_and_ledger_old_fingerprint_current_authority_replay_without_old_private_key_use
  - recoveryCandidate_snapshot_used_as_current_before_gate5
  - pre_gate5_createCurrent_or_readCurrent_operation_scope
  - post_activation_candidate_scope_misused_as_current
  - token_provider_policy_requested_scope_or_epoch_lifecycle_mismatch
  - stale_aborted_or_unavailable_activation_head_for_current_scope
