contract: arkdeck-governance-recovery-artifacts-candidate
version: 1
status: draftNonAuthorizing
purpose: >-
  Close every source, lock, result and publication artifact shape before a
  protected recovery candidate is generated. This planning contract is not an
  executable schema and cannot authorize any repository or external mutation.

serialization:
  text_encoding: utf8WithoutBom
  line_endings: lf
  final_newline: required
  raw_commitment: sha256OfExactFileBytes
  json_canonicalization: RFC8785JCS
  yaml_canonicalization: parseRestrictedYamlThenRFC8785JCS
  yaml_restrictions:
    - duplicateKeysForbidden
    - anchorsAliasesAndMergeKeysForbidden
    - customTagsForbidden
    - nonStringMappingKeysForbidden
    - implicitTimestampAndNonFiniteNumberForbidden
  markdown_canonicalization: exactRawUtf8Bytes
  acceptance_block_canonicalization: >-
    Exact raw LF bytes beginning with the line "## RB-NNN" and ending
    immediately before the next level-two heading or end of file.
  hash_fields: lowercaseSha256Hex
  git_oid_fields: canonicalFullLowercaseCommitOidForRepositoryHashAlgorithm
  unknown_fields: forbidden
  omitted_optional_fields: forbiddenUseExplicitNullWhereContractAllowsNull
  path_form: normalizedRepositoryRelativeRegularFileWithoutGlobOrTraversal
  array_default: orderedAsDeclared
  set_array_rule: sortedUniqueUsingTheFieldSpecificCanonicalKey
  cross_media_field_mapping:
    rule: explicitOnlyNoImplicitCaseConversion
    source_manifest_to_external_subject:
      transition: transition
      source_revision: sourceRevision
      target_revision: targetRevision
      publication_plan_sha256: publicationPlanSha256
      required_stage_role_cardinality_sha256: requiredStageRoleCardinalitySha256
      entries: exactDiffEntries
      path: path
      operation: operation
      base_sha256: baseSha256
      result_sha256: resultSha256
      mode: mode
      object_type: objectType
      publication_role: publicationRole

common_closed_object_rule:
  additionalProperties: false
  duplicateKeys: forbidden
  null_value: forbiddenUnlessFieldRuleExplicitlyAllowsIt
  secretOrPrivateKeyMaterial: forbidden
  executablePathGlob: forbidden

artifact_contracts:
  proposal.md:
    media_type: text/markdown
    exact_frontmatter_fields:
      - id
      - revision
      - class
      - schema
      - governance_mode
      - bootstrap_only
      - recovery_epoch
      - status
      - core_change_level
      - product_behavior_delta
      - supersedes_change_id
      - supersession_barrier_attestation_id
      - source_core_baseline
      - result_core_baseline
      - result_core_baseline_state
    field_rules:
      revision: constantIntegerOne
      class: constantGovernance
      schema: constantArkdeckGovernance
      governance_mode: constantRecoveryBootstrap
      bootstrap_only: constantTrue
      recovery_epoch: constantIntegerOne
      status: constantProposed
      core_change_level: constantMajor
      product_behavior_delta: constantNone
      supersedes_change_id: explicitNull
      supersession_barrier_attestation_id: explicitNull
      source_core_baseline: constantCORE_1_0_0HistoricalOnly
      result_core_baseline: constantCORE_2_0_0
      result_core_baseline_state: constantProposedUnallocated
    exact_body_sections:
      - Incident
      - Governance-only scope
      - Product and Safety invariance
      - Authority boundary
      - Recovery outcome
      - Explicit non-goals

  artifact-contracts.yaml:
    media_type: application/yaml
    exact_root_fields:
      - contract
      - version
      - status
      - purpose
      - serialization
      - common_closed_object_rule
      - artifact_contracts
      - external_subject_contracts
      - supporting_closed_contracts
      - validation_rules
    field_rules:
      version: constantIntegerOne
      self_hash_or_result_revision: forbidden
      complete_json_schemas: >-
        The protected candidate must materialize complete versioned JSON Schema
        documents for every YAML/JSON object defined here; prose field-name
        lists alone do not satisfy the contract.

  scope.yaml:
    media_type: application/yaml
    exact_root_fields:
      - schema_version
      - change_id
      - base_revision_B
      - source_core_baseline
      - result_core_baseline
      - result_core_baseline_state
      - governance_mode
      - product_behavior_delta
      - default_frozen_set
      - fully_frozen_paths
      - projection_frozen_paths
      - projection_extractor_contract
      - preserved_history_paths
      - exact_governance_output_paths
      - preallocated_publication_output_paths
      - publication_mutable_projections
      - forbidden_operations
      - forbidden_capabilities
    field_rules:
      base_revision_B: canonicalFullCommitOid
      result_core_baseline_state: constantProposedUnallocated
      product_behavior_delta: constantNone
      default_frozen_set: sortedExactRegularFileEntriesWithModeTypeAndRawSha256
      fully_frozen_paths: sortedExactRegularFileEntriesNoGlob
      projection_frozen_paths: sortedByPathThenProjectionIdWithExactSegmentsAndRawSha256
      projection_extractor_contract: constantExactByteSegmentsV1
      preserved_history_paths: sortedExactRegularFileEntriesNoGlob
      exact_governance_output_paths: sortedUniqueRegularFilePaths
      preallocated_publication_output_paths: sortedUniqueStageAndRegularFilePath
      publication_mutable_projections: sortedByStagePathJsonPointerAndProjectionId
      forbidden_operations: mustContainDeleteRenameCopyDirectorySymlinkSubmodule
      forbidden_capabilities: mustContainTaskClaimNetworkSecretHardwareAndDestructiveDispatch

  incident-inventory.yaml:
    media_type: application/yaml
    exact_root_fields:
      - schema_version
      - incident_id
      - repository_id
      - collection_cutoff
      - terminal_v1_checkpoint
      - source_inventories
      - snapshots
      - signatures
      - chain_records
      - git_subjects
      - external_approval_subjects
      - change_locks
      - baseline_locks
      - task_packets
      - workflow_and_run_metadata_commitment
      - public_key_fingerprints
      - complete_legacy_identity_set
      - collision_groups
      - evidence_inventory_commitment_sha256
      - history_commitment_sha256
      - completeness_verifier_receipt
      - private_material_scan_result
    field_rules:
      collection_cutoff: externalMonotonicCursorPlusAuditOnlyRfc3339
      terminal_v1_checkpoint: exactLedgerIdRevisionSnapshotHashSignatureHashAndChainHead
      source_inventories: sortedUniqueImmutableSourceIdAndCommitment
      snapshots: sortedByLedgerIdThenRevisionWithRawAndJcsSha256
      signatures: sortedBySnapshotIdentityWithRawSha256AndPublicFingerprint
      chain_records: sortedByLedgerRevisionWithPreviousAndCurrentSnapshotSha256
      git_subjects: sortedByCanonicalCommitOidAndPathWithBlobSha256ModeAndType
      external_approval_subjects: sortedByIdentityKeyThenObservedHash
      change_locks: sortedByIdentityKeyThenObservedHash
      baseline_locks: sortedByIdentityKeyThenObservedHash
      task_packets: sortedByIdentityKeyThenObservedHash
      complete_legacy_identity_set: sortedUniqueByRepositoryKindIdRevisionWithObservedHashes
      collision_groups: exactSubsetOfLegacySetHavingAtLeastTwoDistinctObservedHashes
      evidence_inventory_commitment_sha256: >-
        JCS SHA-256 of the explicit projection containing terminalV1Checkpoint,
        sourceInventories, snapshots, signatures, chainRecords, gitSubjects,
        externalApprovalSubjects, changeLocks, baselineLocks, taskPackets,
        workflowAndRunMetadataCommitment, publicKeyFingerprints,
        completeLegacyIdentitySet and collisionGroups. It excludes both
        commitment fields and the later completeness receipt.
      history_commitment_sha256: >-
        JCS SHA-256 of the closed object containing
        evidenceInventoryCommitmentSha256, terminalV1Checkpoint,
        completeLegacyIdentitySetSha256, collisionGroupsSha256 and
        completenessVerifierReceiptSha256.
      completeness_verifier_receipt: >-
        Controlled external evidence index whose receipt request vector binds the
        evidenceInventoryCommitmentSha256 only; it does not reference the final
        incident manifest or history commitment and therefore creates no cycle.
      private_material_scan_result: mustBeZeroDetectedWithScannerReceipt

  quarantine-manifest.yaml:
    media_type: application/yaml
    exact_root_fields:
      - schema_version
      - quarantine_id
      - incident_id
      - incident_manifest_sha256
      - history_commitment_sha256
      - terminal_v1_checkpoint
      - old_trust_epoch_disposition
      - complete_legacy_identity_set_sha256
      - reserved_legacy_identities
      - direct_collision_tombstones
      - transitive_ineligibility_rules
      - prohibited_reactivation_paths
      - completeness_verifier_receipt
    field_rules:
      old_trust_epoch_disposition: constantPresumedCompromisedNonAuthorizing
      reserved_legacy_identities: exactSortedEqualityWithIncidentLegacyIdentitySet
      direct_collision_tombstones: exactSortedEqualityWithIncidentCollisionGroups
      transitive_ineligibility_rules: >-
        Closed subject-kind matrix for baseline, approval, Change, Task, claim,
        run, verification, archive and release authority references.
      prohibited_reactivation_paths: mustIncludeGitRewriteCloneResetSupersessionAndNewEpochReuse

  core-safety-impact.md:
    media_type: text/markdown
    exact_frontmatter_fields:
      - status
      - product_behavior_delta
      - source_baseline
      - result_baseline
    exact_body_sections:
      - Governance MAJOR rationale
      - Frozen Core requirements and acceptance scenarios
      - Frozen Safety and Agent authority projections
      - Platform Integration and Conformance payload invariance
      - Historical preservation
      - Non-conformance and stop conditions
    field_rules:
      status: constantNoProductOrSafetyDelta
      product_behavior_delta: constantNone

  threat-model.md:
    media_type: text/markdown
    exact_frontmatter_fields:
      - status
      - incident_id
      - model_revision
    exact_body_sections:
      - Assets
      - Trust boundaries
      - Credential capability matrix
      - Threats and mitigations
      - Crash and concurrency model
      - Rollback witness
      - OIDC provenance
      - Residual risks
      - Acceptance mapping

  governance-delta-manifest.yaml:
    media_type: application/yaml
    exact_root_fields:
      - schema_version
      - hash_algorithm
      - product_behavior_delta
      - base_revision_B
      - entries
    field_rules:
      product_behavior_delta: constantNone
      entries: nonEmptySortedUniqueByPath
      entry_exact_fields:
        - path
        - operation
        - base_sha256
        - result_sha256
        - mode
        - object_type
        - locked_source_blob_path
      operation: enumAddReplace
      base_sha256: nullOnlyForAddOtherwiseExactBBlobHash
      result_sha256: equalsLockedSourceBlobRawSha256AndRTargetBlobSha256
      object_type: constantRegularFile
      locked_source_blob_path: uniqueRegularFileUnderGovernanceDelta

  external-transition.yaml:
    media_type: application/yaml
    exact_root_fields:
      - schema_version
      - incident_manifest_sha256
      - quarantine_manifest_sha256
      - independent_recovery_authority_root
      - target_operational_trust_root
      - credential_capability_matrix
      - old_key_disposition
      - service_identities
      - protected_deployment_targets
      - oidc_policy_sha256
      - rollback_witness_identity
      - activation_sequence
      - required_controlled_external_tests
    field_rules:
      independent_recovery_authority_root: preExistsGate1AndRecoverySubjectsOnly
      target_operational_trust_root: createdGate3NonAuthorizingUntilGate5
      credential_capability_matrix: closedNoCrossUseMatrix
      private_key_or_secret_bytes: forbidden
      required_controlled_external_tests: sortedUniqueRBIds

  design.md:
    media_type: text/markdown
    exact_frontmatter_fields:
      - status
      - governance_mode
      - product_behavior_delta
    exact_body_sections:
      - Decisions
      - B R S T P model
      - Artifact graph
      - External authority and services
      - Ledger and quarantine
      - Product invariance
      - Failure and recovery
      - Rejected alternatives

  verification.md:
    media_type: text/markdown
    exact_frontmatter_fields:
      - status
      - acceptance_namespace
      - acceptance_count
    field_rules:
      acceptance_namespace: constantRB
      acceptance_count: constantInteger22
      acceptance_headings: exactlyRB_001ThroughRB_022OnceInAscendingOrder
      acceptance_block_hash: exactRawBlockSha256RecordedInAcceptanceRegistry

  acceptance-cases.yaml:
    media_type: application/yaml
    exact_root_fields:
      - schema_version
      - status
      - id_namespace
      - evidence_classes
      - evidence_origins
      - cases
    field_rules:
      cases: exactly22SortedUniqueByAcceptanceId
      case_exact_fields:
        - acceptance_id
        - test_id
        - method
        - expected_source
        - source_sha256
        - minimum_evidence
        - required_evidence_origin
        - expected_result
      acceptance_id: sequentialRB_001ThroughRB_022
      expected_source: exactVerificationHeading
      source_sha256: exactCanonicalAcceptanceBlockSha256
      controlled_external_cases: mustRequireControlledExternalTestReceipt

  review.md:
    media_type: text/markdown
    exact_frontmatter_fields:
      - status
      - reviewer_class
      - reviewed_inputs_sha256
    exact_body_sections:
      - Scope closure
      - Authority closure
      - Artifact closure
      - Product and Safety invariance
      - Threat-model findings
      - Acceptance coverage
      - Unresolved blockers
    field_rules:
      status: enumDraftBlockedCandidateAcceptedForExternalReview
      approval_effect: none

  publication-plan.yaml:
    media_type: application/yaml
    exact_root_fields:
      - schema_version
      - base_revision_B
      - stage_model
      - preallocated_stage_entries
      - required_stage_role_cardinality
      - stage_invariants
      - external_subject_sequence
    field_rules:
      base_revision_B: canonicalFullCommitOid
      stage_model: constantBRSTP
      preallocated_stage_entries: sortedUniqueByStageThenPath
      required_stage_role_cardinality: >-
        Closed sorted stage/role/count objects fixed at R. Every role in the
        stage role matrix occurs exactly once in this cardinality table, every
        count is a positive integer, and the counts exactly equal the
        preallocated stage entries.
      required_stage_role_cardinality_row_exact_fields:
        - stage
        - publication_role
        - required_count
      required_stage_role_cardinality_unique_key:
        - stage
        - publication_role
      required_stage_role_cardinality_sort: stageEnumOrderThenPublicationRoleUtf8Bytes
      required_stage_role_cardinality_count: positiveJsonInteger
      required_stage_role_cardinality_table_sha256: RFC8785JcsSha256OfEntireSortedTable
      preallocated_entry_exact_fields:
        - stage
        - path
        - operation
        - mode
        - object_type
        - publication_role
        - mutable_json_pointers
        - mutable_projection_ids
      stage: enumRtoS_StoT_TtoP
      operation: enumAddReplace
      object_type: constantRegularFile
      mutable_json_pointers: sortedUniqueOrEmpty
      mutable_projection_ids: sortedUniqueOrEmpty
      source_or_target_commit_oid: forbidden
      base_or_result_sha256: forbidden
      future_bytes: forbidden
      transition_rule: >-
        The plan fixes only path, role, type, mode and permitted mixed-file
        pointers. After each isolated child commit exists, an external stage
        authorization binds its exact parent/child OIDs and exact diff entries.
      external_subject_sequence: >-
        Exact ordered stage-type list ceremony, containment, incident, key
        transition, B-to-R bootstrap, B-to-R result, R-to-S authorization,
        S-to-T authorization, T-to-P authorization, publication result and gate
        open. Rejected retries may add higher hash-linked subjects without
        advancing this state order. One recoveryPermanentAbortAuthorization may
        terminate any nonterminal state and is never a success-path substitute.
      stage_role_matrix:
        R_to_S: [governance_recovery_result_mirror]
        S_to_T:
          - recovery_prepublication_proof
          - fresh_core_baseline_lock_or_manifest
          - fresh_conformance_subject
          - fresh_platform_lock_subject
          - fresh_integration_lock_subject
          - current_config_pin
          - governance_publication_metadata
        T_to_P:
          - exact_recovery_approval_mirror
          - exact_baseline_or_axis_approval_mirror
          - governance_publication_metadata
      stage_invariants: mustForbidExtraPathDeleteMoveHistoricalRewriteAndProductDelta
      every_stage_nonempty: true
      every_role_allowed_only_in_its_declared_stage: true
      every_required_role_has_exact_fixed_cardinality: true

  publication-transition-manifest.yaml:
    media_type: application/yaml
    exact_root_fields:
      - schema_version
      - status
      - purpose
      - hash_algorithm
      - transition
      - source_revision
      - target_revision
      - publication_plan_sha256
      - required_stage_role_cardinality_sha256
      - entries
      - allowed_transitions
      - entry_contract
      - transition_rules
      - completion_rule
    field_rules:
      status: constantAuthorizedExternalInstanceNotTemplate
      purpose: constantExternalParentChildStageAuthorizationInput
      hash_algorithm: constantSha256
      transition: enumRtoS_StoT_TtoP
      source_revision: canonicalFullCommitOid
      target_revision: canonicalFullCommitOidWithExactSingleParentSourceRevision
      publication_plan_sha256: lowercaseSha256Hex
      required_stage_role_cardinality_sha256: exactJcsSha256OfEntireLockedStageRoleCountTable
      entries: nonEmptySortedUniqueByPath
      entry_exact_fields:
        - path
        - operation
        - base_sha256
        - result_sha256
        - mode
        - object_type
        - publication_role
      allowed_transitions: exactConstantRoleMatrixFromLockedPublicationPlan
      entry_contract: exactConstantContractFromProtectedSchema
      transition_rules: exactConstantRulesFromProtectedSchema
      completion_rule: exactConstantRuleFromProtectedSchema
      subject_projection: >-
        Apply only serialization.cross_media_field_mapping, including the
        entries to exactDiffEntries array mapping. The projected object must
        equal the signed stage-authorization fields exactly.

  ready-review.md:
    media_type: text/markdown
    exact_frontmatter_fields:
      - status
      - reviewed_inputs_sha256
      - execution_gate
      - claim_gate
    exact_body_sections:
      - Required source artifacts
      - Exact scope and diff closure
      - External authority prerequisites
      - Acceptance readiness
      - Remaining human gates
      - Forbidden execution paths
    field_rules:
      status: enumBlockedEligibleForRecoveryAuthorizationReview
      execution_gate: constantClosedAtSourceLockTime
      claim_gate: constantClosedAtSourceLockTime
      approval_effect: none

  recovery-lock.yaml:
    media_type: application/yaml
    exact_root_fields:
      - schema_version
      - recovery_change_id
      - recovery_revision
      - base_revision_B
      - static_source_entries
      - dynamic_source_entries
      - source_tree_sha256
      - product_invariance_commitment_sha256
      - incident_manifest_sha256
      - quarantine_manifest_sha256
      - history_commitment_sha256
      - acceptance_registry_sha256
      - publication_plan_sha256
    field_rules:
      recovery_revision: constantIntegerOne
      static_source_entries: sortedUniquePathRawSha256AndJcsSha256WhereApplicable
      dynamic_source_entries: exactManifestReferencedSourceBlobSetSortedByPath
      source_tree_sha256: jcsSha256OfStaticAndDynamicEntries
      self_hash: forbidden
      result_revision_R: forbidden
      stage_S_T_or_P_revision: forbidden

external_subject_contracts:
  common_signed_recovery_subject:
    exact_fields_in_every_subject:
      - schemaVersion
      - subjectType
      - subjectId
      - subjectRevision
      - repositoryId
      - recoverySlot
      - recoveryAuthorityEpoch
      - recoveryLineageId
      - recoverySequence
      - previousRecoverySubjectId
      - previousRecoverySubjectSha256
      - nonce
      - issuedAt
      - notBefore
      - expiresAt
      - humanApproverIdentity
      - externalVerifierId
      - externalVerifierBuildSha256
      - productBehaviorDelta
      - capabilitySet
      - issuer
      - mechanism
      - verificationRef
    field_rules:
      schemaVersion: constant1_0_0
      subjectRevision: constantIntegerOne
      recoverySlot: constantArkdeckGovernanceRecoveryEpoch1
      recoveryLineageId: allocatedByAtomicRecoverySlotServiceNotClientChosen
      recoverySequence: nonNegativeIntegerUniqueCASWithinLineage
      previousRecoverySubjectId: nullOnlyForCeremonyOtherwiseExactImmediatePredecessor
      previousRecoverySubjectSha256: nullOnlyForCeremonyOtherwiseExactImmediatePredecessor
      nonce: uniqueWithinLineageAndNeverAnOrderingAuthority
      issuedAt: auditOnlyRfc3339
      notBefore: rfc3339ValidityOnly
      expiresAt: rfc3339ValidityOnly
      humanApproverIdentity: exactExternallyAuthenticatedHuman
      externalVerifierBuildSha256: lowercaseSha256Hex
      productBehaviorDelta: constantNone
      capabilitySet: sortedUniqueClosedEnumWithNoProductTaskClaimOrHardwareAuthority
      verificationRef: basenameOnlyDetachedSignatureLocator
    chain_rule: >-
      The external recovery service atomically enforces one subject hash for each
      repository, slot, lineage and sequence. A rejected decision consumes its
      sequence but does not advance the recovery state; a later corrected subject
      must use the rejected subject as predecessor and a higher sequence.

  recoveryAuthorityCeremony:
    issuer: independentRecoveryAuthorityRootWithOutOfBandHumanConfirmation
    creation_stage: beforeGate1ImmediatelyAfterAtomicSlotConsumption
    additional_exact_fields:
      - fingerprintAlgorithm
      - recoveryRootFingerprint
      - humanPresenceMethod
      - controlBoundary
      - revocationRule
      - ceremonyReceiptSha256
      - rollbackWitnessServiceIdBuildAndFingerprint
      - initialSlotWitnessHeadReceiptIdAndSha256
      - initialActivationHeadReceiptIdAndSha256
    special_rules:
      - recoverySequenceIsZero
      - previousRecoverySubjectIdAndSha256AreNull
      - doesNotActivateTargetOperationalRoot
      - witnessPinAndInitialHeadRefsExactEqualAtomicReservationOutputs

  recoveryContainmentAuthorization:
    issuer: independentRecoveryAuthorityRoot
    creation_stage: Gate1
    additional_exact_fields:
      - externalGateIds
      - oldKeyFingerprints
      - candidateIncidentObservationsSha256
      - evidenceSourceInventory
      - wormDestinationIdentity
      - containmentReceiptRequirements
      - exactOperationAllowlist
      - exactExpectedEvidence
      - protectedOperatorIdentity
      - decision
    decision_values: [approved, rejected]

  recoveryIncidentAcceptance:
    issuer: independentRecoveryAuthorityRoot
    creation_stage: Gate2
    additional_exact_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - terminalV1Checkpoint
      - completeLegacyIdentitySetSha256
      - collisionIdentitySetAndObservedHashes
      - exposedEpochDisposition
      - transitiveQuarantineRuleSha256
      - completenessVerifierReceiptIdAndSha256
      - decision
    decision_values: [accepted, rejected]

  recoveryKeyTransitionAuthorization:
    issuer: independentRecoveryAuthorityRoot
    creation_stage: Gate3
    additional_exact_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - targetOperationalRootIdAndFingerprint
      - targetTrustEpoch
      - credentialCapabilityMatrixSha256
      - serviceIdsBuildHashesAndPublicFingerprints
      - deploymentTargets
      - oidcPolicySha256
      - rollbackWitnessIdAndFingerprint
      - activationSequence
      - requiredControlledExternalReceiptIdsAndSha256
      - decision
    field_rules:
      activationSequence: exactSlotReservationAllocatedActivationSequence
      targetTrustEpoch: exactFreshExternallyAllocatedEpoch
      serviceIdsBuildHashesAndPublicFingerprints: >-
        Closed sorted unique entries for normalHumanApproval, claimService,
        identityLedgerService, independentRecoveryVerifier and rollbackWitness;
        each entry has exact role/serviceId/buildSha256/publicFingerprint fields.
      rollbackWitnessIdAndFingerprint: >-
        Exact equal to both the atomic reservation/recovery-ceremony witness pin
        and the rollbackWitness service entry; Gate 3 cannot substitute it.
    decision_values: [approved, rejected]

  governanceRecoveryBootstrap:
    issuer: independentRecoveryAuthorityRoot
    creation_stage: afterIsolatedRExistsBeforeProtectedBtoRPublication
    additional_exact_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - recoveryLockSha256
      - governanceDeltaManifestSha256
      - publicationPlanSha256
      - baseRevisionB
      - resultRevisionR
      - resultRevisionRParents
      - exactBtoRDiffEntries
      - protectedOperatorIdentity
      - requiredCandidateAcceptanceIds
      - decision
    field_rules:
      exactBtoRDiffEntries: sortedUniqueClosedGovernanceDiffEntries
      resultRevisionRParents: exactSingleElementArrayContainingBaseRevisionB
      parent_verification_source: protectedProviderCanonicalRawCommitObjectIgnoringLocalReplaceOrGraftRefs
    decision_values: [approved, rejected]

  governanceRecoveryResult:
    issuer: independentRecoveryAuthorityRoot
    creation_stage: afterRBeforeIsolatedSConstruction
    additional_exact_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - bootstrapAuthorizationIdAndSha256
      - baseRevisionB
      - resultRevisionR
      - resultRevisionRParents
      - exactBtoRDiffEntries
      - actualProtectedOutputEntries
      - candidateAcceptanceResults
      - controlledExternalEvidenceIndexRefsAndSha256
      - decision
    decision_values: [passed, failed]
    field_rules:
      resultRevisionRParents: exactSingleElementArrayContainingBaseRevisionB
    forbidden_fields:
      - sourceRevisionS
      - stagingRevisionT
      - publicationRevisionP
      - ledgerV2SnapshotSha256
      - freshBaselineOrAxisApprovalRefs

  governanceRecoveryStageAuthorization:
    issuer: independentRecoveryAuthorityRoot
    creation_stage: afterBothIsolatedParentAndChildCommitsExistBeforeChildPublication
    additional_exact_fields:
      - transition
      - publicationPlanSha256
      - requiredStageRoleCardinalitySha256
      - sourceRevision
      - targetRevision
      - targetParentRevisions
      - stageTransitionManifestRawSha256
      - exactDiffEntries
      - frozenProjectionResults
      - mutableProjectionResults
      - protectedOperatorIdentity
      - decision
    field_rules:
      transition: enumRtoS_StoT_TtoP
      exactDiffEntries: exactSortedEqualityWithPreallocatedStagePathsAndActualGitDiff
      requiredStageRoleCardinalitySha256: exactJcsSha256OfEntireLockedStageRoleCountTable
      stage_cardinality_projection: >-
        Filter the locked global table by row.stage equal to transition. Group
        exactDiffEntries by publicationRole; the resulting role/count map must
        exactly equal that stage projection. Rows for other stages are not
        compared to this single-stage diff.
      targetRevision: canonicalFullCommitOidOfAlreadyConstructedIsolatedChild
      targetParentRevisions: exactSingleElementArrayContainingSourceRevision
      parent_verification_source: protectedProviderCanonicalRawCommitObjectIgnoringLocalReplaceOrGraftRefs
      stageTransitionManifestRawSha256: sha256OfExactRestrictedYamlUtf8LfBytes
      manifest_subject_equality: >-
        After the explicit serialization.cross_media_field_mapping, manifest
        transition, sourceRevision, targetRevision, publicationPlanSha256,
        requiredStageRoleCardinalitySha256 and every entry must equal the signed
        subject fields exactly.
      repository_mirror_of_this_authorization: forbidden
    decision_values: [approved, rejected]

