      - lastRecoverySubjectSha256
      - previousRecoverySubjectId
      - previousRecoverySubjectSha256
      - previousSlotWitnessRecordSha256
      - issuer
      - mechanism
      - verificationRef
    field_rules:
      action: enumConsumeReserveAcceptedAdvanceNonAdvancingSequencePermanentAbort
      subjectDecision: enumReservationCeremonyApprovedAcceptedPassedRejectedFailed
      canonicalization: RFC8785JCS
      detachedSignature: outsidePayloadRequired
      selfHash: forbiddenRawHashStoredByHeadReceiptAndNextRecordOnly
      consume_and_reserve: >-
        slotWitnessSequence is zero; action is consumeAndReserve;
        subjectDecision is reservation; stateBefore is unallocated and
        stateAfter is reserved; all last/previous recovery subject fields are
        explicit null, and previousSlotWitnessRecordSha256 is null. This record
        allocates lineage, authority epoch and activation sequence and creates
        the initial candidate activation head after fixing the rollback-witness
        service ID/build/fingerprint under the out-of-band recovery root.
      ceremony_binding: >-
        The next record has action nonAdvancingSubjectSequenceAdvance,
        subjectDecision ceremony, stateBefore/stateAfter reserved,
        lastRecoverySequence zero and last subject ID/hash equal the exact
        ceremony; its previous recovery-subject fields are null, slot witness
        sequence is one and previousSlotWitnessRecordSha256 equals the exact
        consumeAndReserve record raw hash. Ceremony witness pin and both initial
        head refs equal the exact reservation outputs.
      signed_subject_binding: >-
        For every signed recovery decision, lastRecoverySequence/subject ID/hash,
        previousRecoverySubject ID/hash, subjectDecision and lineage equal the
        exact signed subject and its predecessor. No display value or request
        body may override them.
      accepted_approved_or_passed: >-
        action is acceptedStateAdvance and stateBefore/stateAfter equal the one
        transition prescribed for that subject type, except an approved abort
        uses the atomic abort branch below.
      rejected_or_failed: >-
        action is nonAdvancingSubjectSequenceAdvance and stateAfter equals
        stateBefore, while sequence and predecessor still advance exactly once.
      approved_abort: >-
        The abort subject currentRecoveryState equals stateBefore; the atomic
        abort transaction records action permanentAbort, stateAfter
        permanentlyAborted and publishes the matching activation-head aborted
        receipt, or publishes neither effect.

  claimGateEvidence:
