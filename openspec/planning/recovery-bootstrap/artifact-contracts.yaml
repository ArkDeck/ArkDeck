      spec_gate_condition:
        decision_true: {specGateClosedReason: explicitNull}
        decision_false: {specGateClosedReason: requiredNonEmptyString}
      claimExecutionGateDecision: >-
        Independently approved boolean that may be true only when the exact
        claim-service receipt set proves atomic claim, owner/run attestation,
        resource identity, supersession barrier, serialization, persistence and
        credential cross-use rejection against the pinned suite and build.
