          claimGateEvidence: >-
            Non-null closed object with service ID/build/public fingerprint,
            conformance suite ID/hash and exact receipt IDs/hashes.
          claimGateClosedReason: explicitNull
        decision_false:
          claimGateEvidence: explicitNull
          claimGateClosedReason: requiredNonEmptyString
      overall_decision_condition:
        rejected:
          specExecutionGateDecision: constantFalse
          claimExecutionGateDecision: constantFalse
        approved: mayApplyTheTwoIndependentGateDecisionsSubjectToAllCrossFieldRules
