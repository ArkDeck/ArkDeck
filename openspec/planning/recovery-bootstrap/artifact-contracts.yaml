      state: enumCandidateCurrentAborted
      candidate_branch: >-
        headGeneration is zero; previous receipt ID/hash and all result/abort
        refs are null; state is candidate; repository/slot/lineage/activation
        sequence and rollback-witness service pin equal the atomic reservation record.
      current_branch: >-
        currentResultBundleIdAndSha256 is non-null, both abort refs are null and
        the referenced bundle satisfies its Ready creation_iff predicate. The
        bundle's expected head ID/hash/generation equal this receipt's previous
        ID/hash and headGeneration minus one; all lineage/sequence/witness pins match.
      aborted_branch: >-
        Both abort refs are non-null and currentResultBundleIdAndSha256 is null.
        Authorization decision is approved and the witness commitment satisfies
        its creation_iff predicate; both are exact-equal, and their expected head
        ID/hash/generation equal this receipt's previous ID/hash and headGeneration
        minus one; all lineage/sequence/witness pins match.
      successor_generation: exactlyPreviousHeadGenerationPlusOne
      publication: >-
        Durably prepare the exact receipt payload and detached-signature envelope,
        then one rollback-resistant CAS makes that exact payload, signature and
        latest-head pointer visible as one indivisible unit. Pointer-only,
        payload-only or signature-missing current/aborted state is impossible.
      prepared_tuple_reconcile: >-
        Crash or ambiguous response may finish only the same expected-head,
        payload-hash and signature-envelope-hash tuple; a different tuple conflicts.
      idempotency: sameExpectedHeadAndPayloadReturnsSameReceiptDifferentPayloadConflicts
      self_hash: forbidden
      current_authority: >-
        Only the independently fetched latest signed receipt in state current,
        with an exact valid result bundle, makes its manifest members and gate
        decisions current. Repository or service-local booleans have no effect.
      aborted_effect: >-
        Only the independently fetched latest signed receipt in state aborted
        permanently closes the recovery slot. A stale but valid earlier receipt
        or bundle is rejected.

