      activationSequence: exactGate3KeyTransitionActivationSequence
      activation_membership: >-
        Only approval/baseline/axis/ledger hashes explicitly listed in the exact
        recovery activation manifest become current; target-key signatures not
        listed remain non-authorizing.
      authorization_effect: >-
        Authorize one exact durable activation transaction only. The signed and
        witnessed authorization does not activate a root, subject or gate and
        advances only to activationPending.
      cross_gate_exact_equality: >-
        Publication P, target root/epoch, activation sequence, manifest,
        candidate-envelope set, fresh subject set and both candidate component
        bundles equal the Gate 3, publication-result and activation-manifest
        pins exactly after the declared projection. Any mismatch is rejected.
      activation_head_precondition: >-
        Expected activation-head ID/hash/generation equals the independently
        fetched current candidate head. Current and abort commits race one CAS;
