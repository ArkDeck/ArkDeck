      - claimServicePublicFingerprint
      - claimConformanceSuiteId
      - claimConformanceSuiteSha256
      - atomicClaimReceiptIdsAndSha256
      - ownerRunReceiptIdsAndSha256
      - resourceIdentityReceiptIdsAndSha256
      - supersessionBarrierReceiptIdsAndSha256
      - persistenceSerializationReceiptIdsAndSha256
      - credentialCrossUseReceiptIdsAndSha256
      - activationHeadEnforcementReceiptIdsAndSha256
    field_rules:
      every_receipt_set: nonEmptySortedUniqueControlledExternalEvidenceIndexes
      activation_head_enforcement: >-
        Receipts prove that claim allocation and commit each independently fetch
        the latest activation head, require state current and spec/claim true,
        bind the exact head generation/raw hash/result-bundle hash into the
        claim, and allocate nothing on stale, changed or unavailable head.

  governanceDiffEntry:
    exact_fields:
      - path
      - operation
      - baseSha256
      - resultSha256
      - mode
      - objectType
    field_rules:
      operation: enumAddReplace
      baseSha256: nullOnlyForAddOtherwiseExactBBlobSha256
      resultSha256: exactRBlobSha256
      objectType: constantRegularFile

  stageDiffEntry:
    exact_fields:
      - path
      - operation
      - baseSha256
      - resultSha256
      - mode
      - objectType
      - publicationRole
    field_rules:
      operation: enumAddReplace
      baseSha256: nullOnlyForAddOtherwiseExactParentBlobSha256
      resultSha256: exactChildBlobSha256
      objectType: constantRegularFile

  recoveryPrepublicationProof:
    issuer: independentRecoveryVerifier
    exact_fields:
      - schemaVersion
      - subjectType
      - subjectId
      - subjectRevision
      - repositoryId
      - recoveryLineageId
      - governanceRecoveryResultIdAndSha256
      - sourceRevisionS
      - publicationPlanSha256
      - productInvarianceCommitmentSha256
      - externalVerifierIdAndBuildSha256
      - decision
      - mechanism
      - verificationRef
    forbidden_fields:
      - stagingRevisionT
      - publicationRevisionP

  controlledExternalTestReceipt:
    exact_fields:
      - schemaVersion
      - receiptType
      - receiptId
      - receiptRevision
      - testId
      - serviceOrVerifierId
      - serviceOrVerifierBuildSha256
      - servicePublicFingerprint
      - repositoryId
      - repositoryRevision
      - requestVectorSha256
      - redactedRequest
      - redactedResponse
      - stateBeforeSha256
      - stateAfterSha256
      - stateNotApplicableReason
      - externalAuditSequence
      - observedResult
      - issuer
      - mechanism
      - verificationRef
      - privateMaterialDetected
    field_rules:
      schemaVersion: constant1_0_0
      receiptType: constantControlledExternalTestReceipt
      receiptRevision: constantIntegerOne
      repositoryRevision: canonicalFullCommitOid
      stateBeforeSha256: explicitNullOnlyWhenStateNotApplicableReasonIsNonNull
      stateAfterSha256: explicitNullOnlyWhenStateNotApplicableReasonIsNonNull
      privateMaterialDetected: constantFalse
      redaction: deterministicAndVerifiedNoSecretOrPrivateBytes
      signature_coverage: detachedSignatureOverExactJcsReceiptPayload

  controlledExternalReceiptSignatureEnvelope:
    creation_rule: afterReceiptPayloadExists
    exact_fields:
      - schemaVersion
      - envelopeType
      - receiptId
      - receiptPayloadSha256
      - signerId
      - signerPublicFingerprint
      - mechanism
      - detachedSignatureBytes
    field_rules:
      envelopeType: constantControlledExternalReceiptSignature
      signed_bytes: exactReceiptPayloadJcsBytes
      self_hash: forbidden

  controlledExternalReceiptApprovalSubject:
    creation_rule: afterPayloadAndSignatureEnvelopeExistBeforeIndependentApproval
    exact_fields:
      - schemaVersion
      - subjectType
      - subjectId
      - subjectRevision
      - receiptId
      - receiptPayloadSha256
      - receiptSignatureEnvelopeSha256
      - testId
      - repositoryId
      - repositoryRevision
      - observedResult
    field_rules:
      subjectType: constantControlledExternalReceiptApproval
      subjectRevision: constantIntegerOne
      approval_id_or_hash: forbidden

  controlledExternalEvidenceIndex:
    creation_rule: afterIndependentApprovalOfExactApprovalSubject
    exact_fields:
      - schemaVersion
      - indexType
      - receiptId
      - receiptPayloadSha256
      - receiptSignatureEnvelopeSha256
      - approvalSubjectId
      - approvalSubjectSha256
      - independentApprovalId
      - independentApprovalSha256
    field_rules:
      indexType: constantControlledExternalEvidenceIndex
      approval_rule: >-
        Independent approval binds only the exact approvalSubjectId/hash. The
        final index is created afterward, is never its own approval subject and
        is what recovery result subjects reference by hash.
      self_hash_or_self_approval_reference: forbidden

  frozenProjectionResult:
    exact_fields:
      - path
      - projectionId
      - sourceProjectionSha256
      - targetProjectionSha256
      - result
    field_rules:
      result: constantExactEqual

  mutableProjectionResult:
    exact_fields:
      - path
      - projectionId
      - allowedJsonPointers
      - allowedMutableProjectionIds
      - actualChangedJsonPointers
      - actualChangedProjectionIds
      - sourceProjectionSha256
      - targetProjectionSha256
      - result
    field_rules:
      actual_sets: exactSubsetsOfAllowedSets
      result: constantPass

validation_rules:
  - everyModeledYamlOrJsonObjectHasAdditionalPropertiesFalse
  - everyFormalSchemaRejectsMissingExtraDuplicateOrWrongTypeFields
  - everyManifestEntryPathIsExactAndNeverAGlob
  - everyGovernanceDeltaSourceBlobIsReferencedExactlyOnceAndLockedAtR
  - everyPostRActualDiffEqualsItsExternalParentChildStageAuthorizationExactly
  - noArtifactContainsItsOwnHashOrItsOwnCommitOid
  - noArtifactReferencesAFutureStageCommitOid
  - gitCommitChainHasExactSingleParentsR_B_S_R_T_S_P_T
  - mergeGraftReplaceParentOrAdditionalParentIsRejected
  - noRepositoryMirrorCreatesAuthority
  - noLedgerSnapshotApprovesContentChangeTaskClaimRunOrGate
  - noRecoveryArtifactGrantsProductHardwareNetworkSecretOrTaskClaimCapability
  - preGateCandidateBundlesAndVerifierAttestationsHaveNoAuthorityEffect
  - onlyLatestRollbackResistantActivationHeadCurrentCreatesOperationalAuthority
  - activationManifestPublicationResultAndGateAuthorizationRepeatedPinsAreExactEqual
  - everyClaimAllocationAndCommitBindsAndRechecksTheLatestCurrentActivationHead
  - readyGateOpenResultBundleIffApprovedAcceptedAdvanceAndPassedVerifier
  - abortedActivationHeadIffApprovedAbortAndAtomicPermanentAbortCommitment
  - everyDetachedSignaturePayloadAndSignerExactlyMatchesGate3PinnedRoleAndPayload
  - rollbackWitnessPinIsFixedAtReservationConfirmedByCeremonyAndExactAdoptedByGate3
  - activationHeadPayloadSignatureAndPointerPublishAsOneAtomicVisibilityUnit
