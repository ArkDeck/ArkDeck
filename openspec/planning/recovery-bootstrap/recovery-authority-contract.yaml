contract: arkdeck-governance-recovery-authority-candidate
status: draftNonAuthorizing
rule: >-
  Repository-local records describe expected bytes but never prove authority.
  Every formal recovery subject is issued and verified outside the repository by
  an independent recovery authority root established before Gate 1. Exact closed
  field shapes are defined by artifact-contracts.yaml; this file defines issuer,
  ordering, capability and effect rules only.

authority_roots:
  independentRecoveryAuthorityRoot:
    established: beforeGate1
    fingerprint: pendingOutOfBandHumanConfirmation
    verifier: outsideRepositoryOldTrustEpochTargetRootAndAgentControl
    ceremony_record_requires:
      - fingerprintAlgorithm
      - recoveryRootFingerprint
      - humanPresenceMethod
      - controlBoundary
      - revocationRule
      - ceremonyReceiptSha256
      - rollbackWitnessServiceIdBuildAndFingerprint
      - initialSlotWitnessHeadReceiptIdAndSha256
      - initialActivationHeadReceiptIdAndSha256
    allowed_subject_types:
      - recoveryAuthorityCeremony
      - recoveryContainmentAuthorization
      - recoveryIncidentAcceptance
      - recoveryKeyTransitionAuthorization
      - governanceRecoveryBootstrap
      - governanceRecoveryResult
      - governanceRecoveryStageAuthorization
      - governanceRecoveryPublicationResult
      - recoveryPermanentAbortAuthorization
      - recoveryGateOpenAuthorization
    forbidden_subject_types:
      - normalChangeOrTaskApproval
      - taskClaimOrRunOwner
      - identityLedgerCheckpointOrSnapshot
      - controlledExternalTestReceipt
    lineage_rule: >-
      Gate 1 through Gate 5 share one service-allocated lineage and a hash-linked,
      strictly increasing subject sequence. Old and target operational roots
      cannot authorize, fork, reset or replace this lineage.
  targetOperationalTrustRoot:
    createdBy: recoveryKeyTransitionAuthorization
    creationAuthority: independentRecoveryAuthorityRoot
    selfAuthorization: forbidden
    activation: independentlyFetchedLatestRecoveryActivationHeadStateCurrentOnly
    beforeActivation: recoveryCandidateNonAuthorizing
    preActivationCandidateSubjects:
      - freshCoreBaselineApproval
      - freshConformanceApproval
      - freshPlatformLockApproval
      - freshIntegrationLockApproval
      - identityLedgerRecoveryCandidateSnapshot
    preActivationCandidateSubjectEffect: noneUntilExactGate5Activation
    preActivationEnvelopeContract: artifact-contracts.yaml#supporting_closed_contracts.recoveryCandidateApprovalEnvelope
    activationManifestContract: artifact-contracts.yaml#supporting_closed_contracts.recoveryActivationManifest
    activationMembershipRule: >-
      Gate 5 activates only exact envelope/subject hashes listed in its manifest;
      no other signature created under the target key before Gate 5 becomes current.
    gate_open_authorization_effect: activationTransactionEligibilityOnly
    afterActivation: normalOperationalSubjectsOnlyWhileLatestActivationHeadRemainsValid

common_identity:
  repositoryId: required
  recoverySlot: constantArkdeckGovernanceRecoveryEpoch1
  recoveryAuthorityEpoch: fixedByOutOfBandCeremonyNotClientChosen
  recoveryLineageId: allocatedByAtomicRecoverySlotService
  recoverySequence: nonNegativeUniqueCASWithinLineage
  previousRecoverySubjectId: nullOnlyForCeremonyOtherwiseRequired
  previousRecoverySubjectSha256: nullOnlyForCeremonyOtherwiseRequired
  subjectId: globallyFresh
  subjectRevision: 1
  nonce: cryptographicallyUniqueWithinLineage
  issuedAt: rfc3339AuditOnly
  notBefore: rfc3339ValidityOnly
  expiresAt: rfc3339ValidityOnly
  orderingAuthority: recoverySequenceAndPredecessorHashNotWallClock

lineage_transition_rules:
  - service_atomically_enforces_one_hash_per_repository_slot_lineage_sequence
  - each_non_ceremony_subject_binds_the_exact_immediate_predecessor_id_and_hash
  - rejected_subject_consumes_sequence_but_does_not_advance_gate_state
  - corrected_retry_uses_higher_sequence_and_rejected_subject_as_predecessor
  - same_sequence_or_predecessor_fork_is_rejected_and_audited
  - no_subject_skips_a_required_gate_or_stage_transition

common_verification_invariants:
  - humanApproverIdentity
  - protectedOperatorIdentityWhenAnOperationExists
  - exactOperationAllowlist
  - exactExpectedOutputsOrEvidence
  - externalVerifierIdAndBuildSha256
  - productBehaviorDeltaNone
  - noTaskClaimHardwareOrProductImplementationAuthority

subject_types:
  recoveryAuthorityCeremony:
    purpose: Establish and confirm the independent recovery root and lineage.
    issuer: independentRecoveryAuthorityRootWithOutOfBandHumanConfirmation
    sequence_rule: firstSubjectSequenceZeroWithNullPredecessor
    additional_required_fields:
      - fingerprintAlgorithm
      - recoveryRootFingerprint
      - humanPresenceMethod
      - controlBoundary
      - revocationRule
      - ceremonyReceiptSha256
      - rollbackWitnessServiceIdBuildAndFingerprint
      - initialSlotWitnessHeadReceiptIdAndSha256
      - initialActivationHeadReceiptIdAndSha256
    witness_pin_rule: exactEqualAtomicSlotReservationPinAndInitialHeadOutputs
    accepted_effect: establishesRecoveryVerifierLineageAndReservedStateOnly

  recoveryContainmentAuthorization:
    purpose: Freeze external eligibility and preserve evidence.
    issuer: independentRecoveryAuthorityRoot
    predecessor_state: reserved
    additional_required_fields:
      - externalGateIds
      - oldKeyFingerprints
      - candidateIncidentObservationsSha256
      - evidenceSourceInventory
      - wormDestinationIdentity
      - containmentReceiptRequirements
      - exactOperationAllowlist
      - exactExpectedEvidence
      - protectedOperatorIdentity
      - decision
    decision_values: [approved, rejected]
    approved_state_effect: contained
    allowed_operations:
      - captureMinimalAtomicGitLedgerKeyAndCloudAuditState
      - closeExecutionClaimAndSigningEligibility
      - removeUntrustedWorkflowSigningAccess
      - suspendOldKeyAuthorizationUse
      - copyPublicAndEncryptedForensicMaterialToWormStorage
      - generatePublicHashManifestAndAuditReceipt
    forbidden_operations:
      - signWithOldKey
      - destroyKeyBeforeEvidencePreservation
      - modifyRepositoryProductOrGovernanceBytes
      - openGate

  recoveryIncidentAcceptance:
    purpose: Accept the exact incident, history commitment and quarantine closure.
    issuer: independentRecoveryAuthorityRoot
    predecessor_state: contained
    additional_required_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - terminalV1Checkpoint
      - completeLegacyIdentitySetSha256
      - collisionIdentitySetAndObservedHashes
      - exposedEpochDisposition
      - transitiveQuarantineRuleSha256
      - completenessVerifierReceiptIdAndSha256
      - decision
    decision_values: [accepted, rejected]
    accepted_effect: incidentAndQuarantineFixedForThisLineageAndStateIncidentAccepted

  recoveryKeyTransitionAuthorization:
    purpose: Install a fresh target root, separated signers and persistent services.
    issuer: independentRecoveryAuthorityRoot
    predecessor_state: incidentAccepted
    additional_required_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - targetOperationalRootIdAndFingerprint
      - targetTrustEpoch
      - credentialCapabilityMatrixSha256
      - serviceIdsBuildHashesAndPublicFingerprints
      - deploymentTargets
      - oidcPolicySha256
      - rollbackWitnessIdAndFingerprint
      - activationSequence
      - requiredControlledExternalReceiptIdsAndSha256
      - decision
    decision_values: [approved, rejected]
    activation_sequence_rule: exactSlotReservationAllocatedActivationSequence
    signer_pin_rule: >-
      Every verifier, ledger, slot-witness and activation-head signature envelope
      must map payload ID/hash and signer ID/fingerprint exactly to the matching
      pinned service role. Slot/activation witness envelopes bind first to the
      reservation+ceremony witness pin; Gate 3 must exact-adopt it in both its
      rollbackWitness service entry and rollbackWitnessIdAndFingerprint field.
    private_key_material: forbidden
    accepted_effect: advancesStateToKeyTransitionedAndMayPerformExactServiceTransitionButCannotPublishOrOpenGate

  governanceRecoveryBootstrap:
    purpose: Authorize exact preconstructed B to R candidate bytes.
    issuer: independentRecoveryAuthorityRoot
    predecessor_state: keyTransitioned
    creation_rule: isolatedRAlreadyExistsAndIsNonAuthoritative
    additional_required_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - recoveryLockSha256
      - governanceDeltaManifestSha256
      - publicationPlanSha256
      - baseRevisionB
      - resultRevisionR
      - resultRevisionRParents
      - exactBtoRDiffEntries
      - protectedOperatorIdentity
      - requiredCandidateAcceptanceIds
      - decision
    protected_output_entry_fields:
      - path
      - operation
      - baseSha256
      - resultSha256
      - mode
      - objectType
    accepted_effect: advancesStateToCandidateAuthorizedAndMayValidateAndPublishExactPreconstructedRToIsolatedRecoveryRefOnly
    decision_values: [approved, rejected]

  governanceRecoveryResult:
    purpose: Record independently verified B to R output without self/future reference.
    issuer: independentRecoveryAuthorityRoot
    predecessor_state: candidateAuthorized
    additional_required_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - bootstrapAuthorizationIdAndSha256
      - baseRevisionB
      - resultRevisionR
      - resultRevisionRParents
      - exactBtoRDiffEntries
      - actualProtectedOutputEntries
      - candidateAcceptanceResults
      - controlledExternalEvidenceIndexRefsAndSha256
      - decision
    forbidden_fields:
      - sourceRevisionS
      - stagingRevisionT
      - publicationRevisionP
      - freshBaselineOrAxisApprovalRefs
      - ledgerV2SnapshotSha256
    decision_values: [passed, failed]
    passed_effect: advancesStateToCandidateResultPassedAndEligibleToConstructIsolatedSOnly

  governanceRecoveryStageAuthorization:
    purpose: Authorize one exact post-R parent/child transition.
    issuer: independentRecoveryAuthorityRoot
    allowed_transitions: [R_to_S, S_to_T, T_to_P]
    creation_rule: bothIsolatedParentAndChildCommitsAlreadyExist
    additional_required_fields:
      - transition
      - publicationPlanSha256
      - requiredStageRoleCardinalitySha256
      - sourceRevision
      - targetRevision
      - targetParentRevisions
      - stageTransitionManifestRawSha256
      - exactDiffEntries
      - frozenProjectionResults
      - mutableProjectionResults
      - protectedOperatorIdentity
      - decision
    cardinality_rule: >-
      requiredStageRoleCardinalitySha256 equals the RFC8785-JCS hash of the
      complete locked publication-plan table whose exact row is
      {stage, publication_role, required_count}, uniquely sorted by stage/role.
      Counts of exactDiffEntries grouped by role equal exactly the rows filtered
      to stage == transition; rows for other stages remain out of this comparison.
    stage_order:
      R_to_S: candidateResultPassed
      S_to_T: RtoSAuthorized
      T_to_P: StoTAuthorized
    accepted_state_effect:
      R_to_S: RtoSAuthorized
      S_to_T: StoTAuthorized
      T_to_P: TtoPAuthorized
    decision_values: [approved, rejected]
    accepted_effect: mayPublishOnlyExactSingleParentPreconstructedChildToIsolatedRecoveryRef
    repository_mirror_of_authorization: forbidden

  governanceRecoveryPublicationResult:
    purpose: Verify complete B/R/S/T/P after P exists.
    issuer: independentRecoveryAuthorityRoot
    predecessor_state: TtoPAuthorized
    additional_required_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - governanceRecoveryResultIdAndSha256
      - baseRevisionB
      - resultRevisionR
      - sourceRevisionS
      - stagingRevisionT
      - publicationRevisionP
      - BtoRBootstrapAuthorizationIdAndSha256
      - RtoSStageAuthorizationIdAndSha256
      - StoTStageAuthorizationIdAndSha256
      - TtoPStageAuthorizationIdAndSha256
      - actualStageDiffCommitments
      - activationSequence
      - recoveryActivationManifestIdAndSha256
      - targetOperationalTrustRootIdAndFingerprint
      - targetTrustEpoch
      - freshBaselineAndAxisCandidateApprovalEnvelopeRefsAndSha256
      - freshCurrentCoreBaselineIdAndSha256
      - freshAxisSubjectIdsAndSha256
      - ledgerCandidateComponentBundleIdAndSha256
      - slotWitnessCandidateComponentBundleIdAndSha256
      - acceptanceResultsRB001ThroughRB022
      - controlledExternalEvidenceIndexRefsAndSha256
      - decision
    decision_values: [passed, failed]
    cross_gate_equality: >-
      Manifest, publication result and later Gate 5 authorization repeat only
      exact-equal P/root/epoch/sequence/envelope/fresh-subject/component-bundle
      pins; envelope-to-subject mapping is a bijection.
    passed_condition: bothLedgerAndSlotCandidateComponentBundlesAreActivationEligible
    passed_effect: advancesStateToPublicationVerifiedAndEligibleForSeparateGateOpenReviewOnly

  recoveryPermanentAbortAuthorization:
    purpose: Permanently stop one consumed recovery slot while keeping every gate closed.
    issuer: independentRecoveryAuthorityRoot
    predecessor_state: anyNonTerminalRecoveryState
    additional_required_fields:
      - currentRecoveryState
      - abortReasonCode
      - abortReasonDetail
      - evidenceIndexRefsAndSha256
      - expectedActivationHeadReceiptIdAndSha256
      - expectedActivationHeadGeneration
      - specExecutionGateDecision
      - claimExecutionGateDecision
      - decision
    field_rules:
      specExecutionGateDecision: false
      claimExecutionGateDecision: false
    decision_values: [approved, rejected]
    approved_effect: >-
      Authorize one idempotent atomic abort CAS only. The subject alone has no
      state or gate effect; permanentlyAborted derives only from the latest
      externally fetched activation-head receipt in state aborted.

  recoveryGateOpenAuthorization:
    purpose: Activate exact recovered authority after independent final review.
    issuer: independentRecoveryAuthorityRoot
    predecessor_state: publicationVerified
    additional_required_fields:
      - incidentManifestSha256
      - quarantineManifestSha256
      - historyCommitmentSha256
      - publicationRevisionP
      - governanceRecoveryPublicationResultIdAndSha256
      - activationSequence
      - recoveryActivationManifestIdAndSha256
      - expectedActivationHeadReceiptIdAndSha256
      - expectedActivationHeadGeneration
      - candidateApprovalEnvelopeIdsAndSha256
      - freshCurrentCoreBaselineIdAndSha256
      - freshAxisSubjectIdsAndSha256
      - targetOperationalTrustRootIdAndFingerprint
      - targetTrustEpoch
      - ledgerCandidateComponentBundleIdAndSha256
      - slotWitnessCandidateComponentBundleIdAndSha256
      - acceptanceResultHashesRB001ThroughRB022
      - specExecutionGateDecision
      - specGateClosedReason
      - claimExecutionGateDecision
      - claimGateEvidence
      - claimGateClosedReason
      - independentReviewerIdentity
      - decision
    decision_values: [approved, rejected]
    approved_effect:
      - appendAndWitnessExactAuthorizationAndAdvanceOnlyToActivationPending
      - makeExactRecoveryGateOpenResultBundleConstructionEligible
      - neverActivateRootBaselineAxisSpecOrClaimByTheAuthorizationAlone
    explicitly_not_implied:
      - reviveQuarantinedIdentity
      - approveOldOrRecreatedM0ATask
      - approveCHG003
      - createClaim
      - authorizeRealDeviceOrDestructiveHardware
    conditional_claim_fields:
      activation_sequence_invariant: exactGate3KeyTransitionActivationSequence
      activation_membership_invariant: onlyExactRecoveryActivationManifestMembersBecomeCurrent
      cross_gate_exact_equality: >-
        Every repeated pin equals Gate 3, publication result and activation
        manifest exactly; every envelope maps bijectively to one fresh subject.
      expected_head_invariant: exactIndependentlyFetchedCurrentCandidateActivationHead
      cross_gate_invariant: claimExecutionGateDecisionTrueRequiresSpecExecutionGateDecisionTrue
      overall_decision_rejected:
        specExecutionGateDecision: false
        claimExecutionGateDecision: false
      claimExecutionGateDecision_true:
        claimGateEvidence: >-
          Non-null closed object containing claimServiceId, buildSha256, public
          fingerprint, claimConformanceSuiteIdAndSha256 and exact atomic-claim,
          owner/run, resource, barrier, persistence, serialization and capability
          receipt IDs/hashes, including allocate/commit-time latest activation
          head enforcement receipts.
        claimGateClosedReason: null
      claimExecutionGateDecision_false:
        claimGateEvidence: null
        claimGateClosedReason: requiredNonEmptyString
      specExecutionGateDecision_true:
        specGateClosedReason: null
      specExecutionGateDecision_false:
        specGateClosedReason: requiredNonEmptyString

credential_capability_matrix:
  independentRecoveryAuthorityRoot:
    allows: recoveryAuthoritySubjectsOnly
    human_presence: required
  independentRecoveryVerifier:
    allows:
      - controlledExternalTestReceipt
      - recoveryPrepublicationProof
      - preActivationComponentVerifierAttestation
      - recoveryGateOpenPreCommitVerifierResult
    signing_boundary: outsideRepositoryAndAgentControl
    forbidden: [recoveryAuthoritySubjects, normalApprovalSubjects, claimSubjects, ledgerSubjects]
  normalHumanApproval:
    allows:
      - externallyReviewedNormalApprovalSubjects
      - controlledExternalReceiptApprovalSubject
    human_presence: required
    pre_activation_epoch_state: recoveryCandidateNonAuthorizing
    forbidden: [recoveryAuthoritySubjects, claimSubjects, ledgerSubjects]
  claimService:
    allows:
      - taskClaim
      - taskRunLease
      - resourceIdentitySet
      - changeSupersessionBarrier
    persistent_serialized_service: required
    forbidden: [recoveryAuthoritySubjects, normalApprovalSubjects, ledgerSubjects]
  identityLedgerService:
    allows: [identityLedgerCheckpoint, identityLedgerSnapshot]
    persistent_serialized_service: required
    forbidden: [recoveryAuthoritySubjects, normalApprovalSubjects, claimSubjects]
  publicationOidc:
    allows:
      - createRecoveryCandidateSnapshotForExactCommit
      - createCurrentSnapshotForExactCommit
      - readRecoveryCandidateComponentBundle
      - readCurrentAuthoritativeBundle
    lifecycle_matrix:
      preGate5:
        allowed:
          - createRecoveryCandidateSnapshotForExactCommit
          - readRecoveryCandidateComponentBundle
        output_epoch_state: recoveryCandidateNonAuthorizing
        forbidden:
          - createCurrentSnapshotForExactCommit
          - readCurrentAuthoritativeBundle
      postActivationHeadCurrent:
        allowed:
          - createCurrentSnapshotForExactCommit
          - readCurrentAuthoritativeBundle
        required_anchor: independentlyFetchedLatestCurrentActivationHead
      abortedOrUnavailableHead:
        allowed: []
    exact_match_rule: tokenProviderContextWorkflowPolicyRequestedScopeAndLifecycleMustAllMatch
    signing: forbidden
    forbidden: [recoveryAuthoritySubjects, normalApprovalSubjects, claimSubjects]
  cross_use_test: everyWrongCredentialAndSubjectPairIsRejectedAndExternallyAudited

controlled_external_test_receipt:
  closed_contract: artifact-contracts.yaml#supporting_closed_contracts.controlledExternalTestReceipt
  signature_envelope_contract: artifact-contracts.yaml#supporting_closed_contracts.controlledExternalReceiptSignatureEnvelope
  approval_subject_contract: artifact-contracts.yaml#supporting_closed_contracts.controlledExternalReceiptApprovalSubject
  final_index_contract: artifact-contracts.yaml#supporting_closed_contracts.controlledExternalEvidenceIndex
  complete_json_schema_required: true
  canonicalization: RFC8785JCS
  detached_signature_over_payload_required: true
  independent_approval_binds_only_exact_post_signature_approval_subject: true
  final_index_is_created_after_approval_and_never_approved_by_that_approval: true
  private_or_secret_material: forbidden

single_use_recovery_slot:
  consume_before_first_external_operation: true
  atomic_key:
    repositoryId: exactRepositoryIdentity
    governanceSchema: arkdeck-governance
    recoveryEpoch: 1
  attacker_controlled_key_fields: none
  consumed_record: appendOnlyExternalRecoveryEpochConsumed
  consumed_record_values:
    - allocatedRecoveryAuthorityEpoch
    - allocatedRecoveryLineageId
    - allocatedActivationSequence
    - reservedRollbackWitnessServiceIdBuildAndFingerprint
    - initialSlotWitnessHeadReceiptIdAndSha256
    - initialActivationHeadReceiptIdAndSha256
    - ceremonySubjectIdAndSha256
    - state
    - lastRecoverySequence
    - lastRecoverySubjectIdAndSha256
    - activationHeadReceiptIdAndSha256
    - activationHeadGeneration
  state_machine:
    - reserved
    - contained
    - incidentAccepted
    - keyTransitioned
    - candidateAuthorized
    - candidateResultPassed
    - RtoSAuthorized
    - StoTAuthorized
    - TtoPAuthorized
    - publicationVerified
    - activationPending
    - gateOpened
    - permanentlyAborted
  exact_state_transitions:
    reserved: [contained, permanentlyAborted]
    contained: [incidentAccepted, permanentlyAborted]
    incidentAccepted: [keyTransitioned, permanentlyAborted]
    keyTransitioned: [candidateAuthorized, permanentlyAborted]
    candidateAuthorized: [candidateResultPassed, permanentlyAborted]
    candidateResultPassed: [RtoSAuthorized, permanentlyAborted]
    RtoSAuthorized: [StoTAuthorized, permanentlyAborted]
    StoTAuthorized: [TtoPAuthorized, permanentlyAborted]
    TtoPAuthorized: [publicationVerified, permanentlyAborted]
    publicationVerified: [activationPending, permanentlyAborted]
    activationPending: [gateOpened, permanentlyAborted]
    gateOpened: []
    permanentlyAborted: []
  gateOpened_state_semantics: >-
    Terminal activation-finalized state name; it does not imply both gate
    booleans are true. Exact spec/claim decisions are read from the current
    activation result chain and may independently remain false.
  rollback_resistant_witness:
    control_boundary: separateFromRecoverySlotDatabaseHeadSignerAndBackup
    record_contract: artifact-contracts.yaml#supporting_closed_contracts.recoverySlotWitnessRecord
    record_signature_contract: artifact-contracts.yaml#supporting_closed_contracts.slotWitnessRecordSignatureEnvelope
    candidate_component_bundle_contract: artifact-contracts.yaml#supporting_closed_contracts.slotWitnessCandidateComponentBundle
    head_receipt_contract: artifact-contracts.yaml#supporting_closed_contracts.slotWitnessHeadReceipt
    head_signature_contract: artifact-contracts.yaml#supporting_closed_contracts.slotWitnessHeadReceiptSignatureEnvelope
    record_fields:
      - slotWitnessId
      - slotWitnessEpoch
      - slotWitnessSequence
      - repositoryId
      - governanceSchema
      - recoveryEpoch
      - allocatedRecoveryAuthorityEpoch
      - allocatedRecoveryLineageId
      - allocatedActivationSequence
      - reservedRollbackWitnessServiceIdBuildAndFingerprint
      - action
      - subjectDecision
      - stateBefore
      - stateAfter
      - lastRecoverySequence
      - lastRecoverySubjectId
      - lastRecoverySubjectSha256
      - previousRecoverySubjectId
      - previousRecoverySubjectSha256
      - previousSlotWitnessRecordSha256
      - issuer
      - mechanism
      - verificationRef
    action_values:
      - consumeAndReserve
      - acceptedStateAdvance
      - nonAdvancingSubjectSequenceAdvance
      - permanentAbort
    canonicalization: RFC8785JCS
    detached_signature: requiredOutsideRecordPayload
    raw_record_hash: >-
      Computed over exact payload bytes and stored only in the external witness
      head/receipt and next record's previousSlotWitnessRecordSha256; the record
      never contains its own hash.
    rule: >-
      Every consume and every signed decision (approved, accepted, passed,
      rejected or failed), including permanent abort, is appended before a
      response or state effect. Rolling back
      the slot service database, head, signer and backup cannot make the fixed
      slot available, remove a non-advancing sequence or lower its witnessed state.
    subject_state_exactness: >-
      Accepted/approved/passed decisions bind the exact prescribed transition;
      rejected/failed decisions keep stateAfter equal to stateBefore while
      consuming sequence; an approved abort binds currentRecoveryState to
      stateBefore and is effective only with the matching atomic aborted head.
  retry_rule: onlySameAllocatedLineageWithHigherHashLinkedSequence
  abort_rule: permanentAbortKeepsSlotConsumedAndGateClosed
  concurrent_rule: exactlyOneRequestCanConsumeTheRepositorySchemaEpochSlot
  changed_lineage_epoch_nonce_clone_reset_or_history_rewrite_effect: noNewSlot

activation_transaction:
  authorization_state: activationPending
  result_bundle_contract: artifact-contracts.yaml#supporting_closed_contracts.recoveryGateOpenResultBundle
  pre_commit_verifier_contract: artifact-contracts.yaml#supporting_closed_contracts.recoveryGateOpenPreCommitVerifierResult
  activation_head_contract: artifact-contracts.yaml#supporting_closed_contracts.recoveryActivationHeadReceipt
  activation_head_signature_contract: artifact-contracts.yaml#supporting_closed_contracts.recoveryActivationHeadReceiptSignatureEnvelope
  abort_witness_commitment_contract: artifact-contracts.yaml#supporting_closed_contracts.recoveryAbortWitnessCommitment
  control_boundary: sameIndependentRollbackResistantWitnessAsRecoverySlotButSeparateCASHead
  hash_dag:
    - recoveryActivationManifest
    - recoveryGateOpenAuthorization
    - postAuthorizationSlotWitnessCandidateComponentBundle
    - recoveryGateOpenPreCommitVerifierResult
    - recoveryGateOpenResultBundle
    - recoveryActivationHeadReceipt
  no_future_or_self_reference: true
  initial_candidate_head: >-
    In the atomic slot-reservation transaction, the witness service publishes one
    signed candidate head for this slot/lineage and service-allocated activation
    sequence, using the witness ID/build/fingerprint fixed in that reservation.
    The immediate recovery ceremony confirms the exact pin and both initial heads.
    Gate 3 must adopt that exact sequence and witness pin; later manifest, Gate 5 and
    any earlier abort pin its exact ID/raw hash/generation. It contains no result
    or abort refs.
  prepare_rule: >-
    Root, baseline, axis, ledger and gate participants may stage exact candidate
    bytes, but their local state remains non-authorizing. Pre-commit verification
    resolves every cross-Gate pin and the latest slot/activation heads. A Ready
    result bundle exists iff Gate 5 is approved, its exact slot record is the
    accepted publicationVerified-to-activationPending advance and the signed
    pre-commit verifier decision is passed; every other result is audit-only.
  current_commit: >-
    Durably prepare the exact current-head payload and detached signature, then
    CAS the independently fetched expected candidate head so that payload,
    signature and latest-head pointer become visible as one indivisible unit,
    with one exact ready result-bundle hash after re-evaluating that iff predicate.
    A failed verifier, rejected/non-advancing authorization or mismatched slot
    state is never CAS-eligible. CAS failure creates no authority; ambiguous
    response reconciles only the same expected-head/payload/signature tuple.
  abort_commit: >-
    Durably prepare the exact signed abort slot record/head commitment and both
    head signatures, then publish slot payload/signature/pointer and CAS the same
    expected activation payload/signature/pointer to aborted in one serializable
    witness transaction, or publish neither. Current and abort
    commits against one expected head cannot both succeed. The CAS is eligible
    only when abort decision is approved, both gate decisions are false and the
    commitment proves approved/permanentAbort from the exact current
    recovery state to permanentlyAborted.
  authority_rule: >-
    Only an independently fetched latest, valid, rollback-resistant activation
    head payload and detached signature in state current create current
    root/baseline/axis/spec/claim authority.
    Gate authorization, candidate bundles, verifier results and result bundle
    individually have no authority effect.
  reconciliation:
    before_current_cas: retrySameTransactionOrPerformAuthorizedAbort
    after_ambiguous_current_cas: independentlyQueryHeadAndReturnSameReceiptOrFailClosed
    current_head_observed: deriveGateOpenedAndNeverUseRecoveryAbort
    aborted_head_observed: derivePermanentlyAbortedAndRejectEveryCurrentRetry
  local_boolean_or_cached_head_authority: forbidden

claim_runtime_activation_binding:
  independently_fetch_latest_head_at:
    - beforeClaimIdentityAllocation
    - insideAtomicClaimCommit
  require:
    - activationHeadStateCurrent
    - exactValidRecoveryGateOpenResultBundle
    - gateAuthorizationSpecDecisionTrue
    - gateAuthorizationClaimDecisionTrue
    - claimEvidenceServiceBuildKeyAndSuiteEqualCurrentService
    - activationHeadGenerationAndRawSha256UnchangedAtCommit
  persist_in_claim_and_receipt:
    - activationHeadReceiptIdAndRawSha256
    - activationHeadGeneration
    - recoveryGateOpenResultBundleIdAndSha256
  failure_effect: zeroClaimIdentityAllocationAndFailClosed
  clientSuppliedOrCachedHead: forbidden

verification_rules:
  - everySubjectBytesAreImmutableExternallySignedAndClosedSchemaValid
  - everySubjectIsRegisteredOnceInNewPersistentLedger
  - subjectIdentityOrHashReuseIsRejected
  - approverOperatorVerifierAndServiceCredentialsAreCapabilitySeparated
  - operatorMatchesActualExternalAuditIdentity
  - operationOccursWithinValidityAndExactHashLinkedRecoverySequence
  - actualOutputsEqualExpectedOutputsWithoutExtraPaths
  - canonicalRawGitParentsAreExactlyR_B_S_R_T_S_P_TWithNoMergeGraftOrReplace
  - lowerGateSubjectNeverImpliesHigherGateAuthority
  - repositoryLocalCopyIsOnlyANonAuthorizingMirror
  - oldEpochSignatureCannotAuthorizeAnySubject
  - serviceTimeoutOrAmbiguousResultIsFailure
  - everyCredentialIsRejectedForOutOfScopeSubjectTypes
  - recoverySlotIsAtomicallyConsumedExactlyOnce
  - manifestPublicationResultAndGateAuthorizationRepeatedPinsAreExactEqual
  - candidateEnvelopeAndFreshSubjectSetsAreBijective
  - noGateAuthorityExistsBeforeLatestActivationHeadCurrentCAS
  - currentAndAbortCASAgainstOneExpectedHeadAreMutuallyExclusive
  - everyClaimAllocationAndCommitRechecksAndBindsLatestActivationHead

forbidden_shortcuts:
  - chatTokenAsFormalApproval
  - markdownStatusAsAuthority
  - localGuardSuccessAsGateOpen
  - ordinaryChangeOrTaskApprovalAsRecoveryAuthority
  - candidateGuardOrVerifierApprovingItsOwnBytes
  - oldKeySigningNewRootOrQuarantine
  - uncommittedWorktreeAsAuthorizationSubject
  - storeFutureStageBytesHashesOrCommitOidsInR
  - mirrorStageAuthorizationIntoItsOwnTargetCommit
