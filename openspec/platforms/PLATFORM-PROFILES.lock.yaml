change_rule: >-
  An approved platform change may issue a new PLATFORM-PROFILES lock revision
  without changing Core behavior or CORE-x.y.z. Tasks still pin the exact profile
  hash. Delivery/not-started lifecycle is versioned on this Platform axis and does
  not rewrite the Core baseline or Core conformance suite. A profile that changes
  Core semantics is invalid and requires a Core change.
  A verified entry is valid only for its last_verified profile, verification,
  platform case manifest, implementation revision/release artifact/environment,
  Core, Integration and Conformance hashes plus structured approved evidence.
  A changed pin forces needsReverification until new evidence exists. Revision 2+
  must hash-pin its accepted predecessor in history; verified history cannot reset.
  `verified` is scoped only to the exact passed supportMatrix tuples and release
  artifact hashes in its approved PCE; any other build, OS/arch/package tuple or
  expired validity window is unverified and requires a new lock revision/evidence.
  The entry's protected release_subject is the only current release object; a
  new commit/package changes that pin and forces needsReverification until its
  exact per-cell PCE passes.
