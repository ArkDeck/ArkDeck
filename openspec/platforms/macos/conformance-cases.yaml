suite: PLATFORM-MACOS-CASES-0.1.0
platform: macos
version: 0.1.0
support_cells:
  - { id: macos-14-arm64-developer-id, os_version_family: "14", architecture: arm64, package_format: app-bundle-developer-id }
cases:
  - { id: MAC-M0A-DIST-001, test_id: TEST-MAC-M0A-DIST-001, method: "ADR lint plus independent signed review.", expected_result: "Exactly one distribution path, entitlement set, rejected alternatives, risks and revalidation triggers are recorded.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-DIST-001", minimum_evidence: manualReview }
  - { id: MAC-M0A-HDC-001, test_id: TEST-MAC-M0A-HDC-001, method: "Installed-tool discovery and semantic-failure matrix.", expected_result: "Every candidate reports path, version and hash; semantic failures are non-success.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-HDC-001", minimum_evidence: platform }
  - { id: MAC-M0A-HDC-002, test_id: TEST-MAC-M0A-HDC-002, method: "Isolated-endpoint HDC supervisor contract suite.", expected_result: "External server automatic kill count is zero and every ownership/generation case reaches its defined result.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-HDC-002", minimum_evidence: platform }
  - { id: MAC-M0A-JOURNAL-001, test_id: TEST-MAC-M0A-JOURNAL-001, method: "Filesystem durability and torn-write fault matrix.", expected_result: "A failed durable intent prevents external command dispatch and recovery detects the incomplete record.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-JOURNAL-001", minimum_evidence: platform }
  - { id: MAC-M0A-POWER-001, test_id: TEST-MAC-M0A-POWER-001, method: "Reference-counted activity tests and idle-sleep observation.", expected_result: "The assertion exists only in critical scope and is released on every terminal/error path.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-POWER-001", minimum_evidence: platform }
  - { id: MAC-M0A-PROC-001, test_id: TEST-MAC-M0A-PROC-001, method: "ProcessExecutor Port contract suite.", expected_result: "argv/no-shell, stream, timeout, cancel and process-tree cases pass.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-PROC-001", minimum_evidence: platform }
  - { id: MAC-M0A-RUNTIME-001, test_id: TEST-MAC-M0A-RUNTIME-001, method: "Two-process single-instance contract test.", expected_result: "Exactly one writer owns the lock and the loser produces zero device/session side effects.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-RUNTIME-001", minimum_evidence: platform }
  - { id: MAC-M0A-SANDBOX-001, test_id: TEST-MAC-M0A-SANDBOX-001, method: "End-to-end selected file/key/output and USB/UART/TCP matrix.", expected_result: "Every prototype and resource cell has an observed allow/deny result and no undeclared access.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-SANDBOX-001", minimum_evidence: realHardware, hardware_capability: hdcConnectivity }
  - { id: MAC-M0A-SHELL-001, test_id: TEST-MAC-M0A-SHELL-001, method: "Clean build, signature inspection and clean-user launch smoke.", expected_result: "The signed app launches and module boundaries remain separated.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-SHELL-001", minimum_evidence: platform }
  - { id: MAC-M0A-TRUST-001, test_id: TEST-MAC-M0A-TRUST-001, method: "Clean-VM HDC provenance/path/key/server/file matrix.", expected_result: "Every matrix cell is passed, failed or blocked with exact tool hash and none is unclassified.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-TRUST-001", minimum_evidence: platform }
  - { id: MAC-M0A-TRUST-002, test_id: TEST-MAC-M0A-TRUST-002, method: "Clean-VM execution of quarantined downloaded HDC.", expected_result: "System block or explicit system user allow is reported; ArkDeck quarantine mutation count is zero.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-TRUST-002", minimum_evidence: platform }
  - { id: MAC-M0A-TRUST-003, test_id: TEST-MAC-M0A-TRUST-003, method: "Bit-identical no-quarantine control.", expected_result: "The control isolates Gatekeeper from Sandbox and file-access failures.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-TRUST-003", minimum_evidence: platform }
  - { id: MAC-M0A-TRUST-004, test_id: TEST-MAC-M0A-TRUST-004, method: "Safari download and Archive Utility extraction on restored VM.", expected_result: "Quarantine propagation and assessment are captured without xattr mutation.", expected_source: "openspec/platforms/macos/conformance-cases.yaml#MAC-M0A-TRUST-004", minimum_evidence: platform }
