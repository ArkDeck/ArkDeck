suite: PLATFORM-WINDOWS-CASES-0.1.0
platform: windows
version: 0.1.0
support_cells:
  - { id: windows-11-x86-64-msix, os_version_family: "11", architecture: x86_64, package_format: msix }
cases:
  - { id: WIN-PROCESS-001, test_id: TEST-WIN-PROCESS-001, method: "Windows Process Port contract suite.", expected_result: "argv/no-shell, process-tree, stream, timeout and cancellation cases pass.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-PROCESS-001", minimum_evidence: platform }
  - { id: WIN-INSTANCE-001, test_id: TEST-WIN-INSTANCE-001, method: "Two-process Named Mutex and activation test.", expected_result: "Exactly one owner remains and secondary side-effect count is zero.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-INSTANCE-001", minimum_evidence: platform }
  - { id: WIN-POWER-001, test_id: TEST-WIN-POWER-001, method: "Power Request reference-count and fault-path suite.", expected_result: "Every acquisition is released on success, error and cancellation.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-POWER-001", minimum_evidence: platform }
  - { id: WIN-STORAGE-001, test_id: TEST-WIN-STORAGE-001, method: "Volume GUID, remount and ENOSPC matrix.", expected_result: "Same-volume aliases group together and removal/read-only/ENOSPC map deterministically.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-STORAGE-001", minimum_evidence: platform }
  - { id: WIN-FILE-ACCESS-001, test_id: TEST-WIN-FILE-ACCESS-001, method: "Picker and cross-restart child-process access test.", expected_result: "Only explicitly selected persistent resources remain accessible.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-FILE-ACCESS-001", minimum_evidence: platform }
  - { id: WIN-TOOL-TRUST-001, test_id: TEST-WIN-TOOL-TRUST-001, method: "Authenticode, MOTW, SmartScreen and Defender matrix.", expected_result: "Each state is reported without bypassing OS protection.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-TOOL-TRUST-001", minimum_evidence: platform }
  - { id: WIN-DEVICE-ACCESS-001, test_id: TEST-WIN-DEVICE-ACCESS-001, method: "USB/UART driver and permission allow/deny matrix.", expected_result: "Diagnostics are actionable and elevation/driver/policy mutation call count is zero.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-DEVICE-ACCESS-001", minimum_evidence: platform }
  - { id: WIN-LOGGING-001, test_id: TEST-WIN-LOGGING-001, method: "ETW privacy, rotation and export suite.", expected_result: "Secrets are redacted and bounded logs export deterministically.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-LOGGING-001", minimum_evidence: platform }
  - { id: WIN-CLOCK-WAKE-001, test_id: TEST-WIN-CLOCK-WAKE-001, method: "Sleep/wake and dual-clock fault matrix.", expected_result: "Elapsed/active clocks and ETA reset follow the Port contract.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-CLOCK-WAKE-001", minimum_evidence: platform }
  - { id: WIN-FILE-REVEAL-001, test_id: TEST-WIN-FILE-REVEAL-001, method: "Explorer reveal/fallback matrix.", expected_result: "Success, missing, denied and unavailable states have defined outcomes.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-FILE-REVEAL-001", minimum_evidence: platform }
  - { id: WIN-DISTRIBUTION-001, test_id: TEST-WIN-DISTRIBUTION-001, method: "Signed MSIX clean-host install/upgrade/uninstall smoke.", expected_result: "All lifecycle operations pass for the exact release artifact.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-DISTRIBUTION-001", minimum_evidence: platform }
  - { id: WIN-ACCESSIBILITY-001, test_id: TEST-WIN-ACCESSIBILITY-001, method: "Bilingual keyboard, screen-reader and danger-confirmation suite.", expected_result: "zh-Hans/en and accessibility paths expose equivalent safe actions.", expected_source: "openspec/platforms/windows/conformance-cases.yaml#WIN-ACCESSIBILITY-001", minimum_evidence: platform }

