suite: PLATFORM-LINUX-CASES-0.1.0
platform: linux
version: 0.1.0
support_cells:
  - { id: ubuntu-24-04-x86-64-appimage, os_version_family: "Ubuntu 24.04", architecture: x86_64, package_format: appimage }
cases:
  - { id: LINUX-PROCESS-001, test_id: TEST-LINUX-PROCESS-001, method: "POSIX Process Port contract suite.", expected_result: "argv/no-shell, process-tree, stream, timeout and cancellation cases pass.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-PROCESS-001", minimum_evidence: platform }
  - { id: LINUX-INSTANCE-001, test_id: TEST-LINUX-INSTANCE-001, method: "Two-process flock/D-Bus activation matrix.", expected_result: "Exactly one owner remains and stale-file/secondary side effects are deterministic.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-INSTANCE-001", minimum_evidence: platform }
  - { id: LINUX-POWER-001, test_id: TEST-LINUX-POWER-001, method: "logind inhibitor and sleep/wake fault suite.", expected_result: "Reference counts release on every path and wake events reconcile once.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-POWER-001", minimum_evidence: platform }
  - { id: LINUX-STORAGE-001, test_id: TEST-LINUX-STORAGE-001, method: "Filesystem identity/remount/ENOSPC matrix.", expected_result: "Mount aliases group correctly and removal/read-only/ENOSPC map deterministically.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-STORAGE-001", minimum_evidence: platform }
  - { id: LINUX-FILE-ACCESS-001, test_id: TEST-LINUX-FILE-ACCESS-001, method: "XDG Portal and direct-path child access matrix.", expected_result: "Only selected/persisted resources are accessible in the selected distribution.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-FILE-ACCESS-001", minimum_evidence: platform }
  - { id: LINUX-TOOL-TRUST-001, test_id: TEST-LINUX-TOOL-TRUST-001, method: "Package provenance, owner/mode/hash and unknown-verdict matrix.", expected_result: "Unknown trust remains unknown and no OS protection is bypassed.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-TOOL-TRUST-001", minimum_evidence: platform }
  - { id: LINUX-DEVICE-ACCESS-001, test_id: TEST-LINUX-DEVICE-ACCESS-001, method: "USB/UART udev/group allow/deny matrix.", expected_result: "Guidance is actionable and sudo/pkexec/rule mutation count is zero.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-DEVICE-ACCESS-001", minimum_evidence: platform }
  - { id: LINUX-LOGGING-001, test_id: TEST-LINUX-LOGGING-001, method: "journald/privacy/rotation/export suite.", expected_result: "Secrets are redacted and bounded diagnostics export deterministically.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-LOGGING-001", minimum_evidence: platform }
  - { id: LINUX-CLOCK-WAKE-001, test_id: TEST-LINUX-CLOCK-WAKE-001, method: "Suspend and dual-clock matrix.", expected_result: "BOOTTIME/MONOTONIC and ETA reset follow the Port contract.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-CLOCK-WAKE-001", minimum_evidence: platform }
  - { id: LINUX-FILE-REVEAL-001, test_id: TEST-LINUX-FILE-REVEAL-001, method: "FileManager1 and desktop fallback matrix.", expected_result: "Success, missing, denied and unavailable states have defined outcomes.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-FILE-REVEAL-001", minimum_evidence: platform }
  - { id: LINUX-DISTRIBUTION-001, test_id: TEST-LINUX-DISTRIBUTION-001, method: "Signed AppImage clean-host launch/update/removal smoke.", expected_result: "All declared lifecycle operations pass for the exact artifact.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-DISTRIBUTION-001", minimum_evidence: platform }
  - { id: LINUX-ACCESSIBILITY-001, test_id: TEST-LINUX-ACCESSIBILITY-001, method: "Bilingual keyboard, AT-SPI and danger-confirmation suite.", expected_result: "zh-Hans/en, Wayland/X11 and accessibility paths expose equivalent safe actions.", expected_source: "openspec/platforms/linux/conformance-cases.yaml#LINUX-ACCESSIBILITY-001", minimum_evidence: platform }

