  minimum_evidence: contract
  expected_result: For every change carrying a scope.yaml, the guard verifies
    that each acceptance ID in scope.yaml is claimed by at least one task's
    Requirements/AC line (including its indented continuation lines), and emits
    a named error identifying the exact unclaimed acceptance ID when one is not
    covered; the check is one-directional (scope acceptance is a subset of the
    claimed union, tasks may reference extra out-of-scope read-only inputs), and
    changes without a scope.yaml are skipped. Synthetic fixtures prove the
    positive path (full coverage, zero error, across backtick / delimiter /
    continuation-line variants), the core negative path (one unclaimed scope AC
    yields exactly one named error), the parsing boundaries, and the skip case;
    a real-baseline assertion proves the four current scope.yaml changes
    (M0A, M1, CHG-005, M0B) have zero scope-coverage error so the enhancement
    introduces no false positive and keeps check-sdd at 0 errors / 0 warnings /
    111 acceptance IDs. The change touches only the guard tool and its test,
    with no spec, contract, baseline, product or device change.
