change_revision: 5
platform: macos
evidence_classes:
- documentReview
cases:
- acceptance_id: AFP-HANDBOOK-001
  test_id: TEST-AFP-HANDBOOK-001
  method: Non-normative handbook structure, provenance, authority and privacy review.
  expected_source: openspec/changes/chg-2026-029-agent-failure-prevention/verification.md#AFP-HANDBOOK-001
  minimum_evidence: documentReview
  expected_result: >-
    The handbook declares its non-normative authority and conflict boundary on
    the first screen; AF-001 through AF-018 are unique and each contains a
    signal, observed repository cases, root cause, preflight, positive and
    negative verification, canonical references, an honest automation status,
    and currency bound to a full protected-main OID and date. AF-001 through
    AF-009 carry the observed sub-surfaces registered in design section 3.1, and
    AF-010 through AF-018 match the root causes and case anchors registered in
    design section 3.2. AF-014 uses the capability-bound reliable-total
    factory/receipt first sources registered in design section 3.3 and contains
    no public-enum bypass assertion. Links resolve, facts and inferences are
    distinct, raw or sensitive evidence is not copied, no normative or approval
    semantics are created, and archive bytes are not modified.
- acceptance_id: AFP-TEMPLATE-001
  test_id: TEST-AFP-TEMPLATE-001
  method: Before-and-after document review of the three change templates.
  expected_source: openspec/changes/chg-2026-029-agent-failure-prevention/verification.md#AFP-TEMPLATE-001
  minimum_evidence: documentReview
  expected_result: >-
    The task, design and evidence-run templates add the bounded fields defined
    by design section 4 without deleting or relaxing any existing scope,
    dependency, risk, hardware, failure, security, verification or evidence
    classification entry. An honest not-applicable answer requires a reason
    and is not an automatic pass; the templates create no approval or status
    semantics, do not upgrade fake or simulation evidence, and do not let the
    handbook override a canonical rule.
- acceptance_id: AFP-DRILL-001
  test_id: TEST-AFP-DRILL-001
  method: Fixed historical-case detection drill using repository audit records only.
  expected_source: openspec/changes/chg-2026-029-agent-failure-prevention/verification.md#AFP-DRILL-001
  minimum_evidence: documentReview
  expected_result: >-
    Six readiness-pinned historical case families each map to the earliest
    trigger stage, an AF identifier, a concrete template field, the action that
    should have occurred, and the repository evidence that ultimately exposed
    the problem. At least one environment-only counterexample remains an
    environment blocker or deviation rather than a product failure. The drill
    changes no historical bytes or conclusions and creates no production,
    hardware, conformance, support or release claim.
- acceptance_id: AFP-CORRECT-001
  test_id: TEST-AFP-CORRECT-001
  method: First-source verification review of every handbook Fact assertion.
  expected_source: openspec/changes/chg-2026-029-agent-failure-prevention/verification.md#AFP-CORRECT-001
  minimum_evidence: documentReview
  expected_result: >-
    The r5 addendum marks the old AFP-004 AF-014 PASS conclusion as superseded.
    Every current Fact line in handbook entries AF-001 through AF-018 is matched
    to a first-source repository record by relative path, full 40-hex blob OID
    and searchable locator, with a supported or unsupported verdict. Unsupported
    specific wording is either rewritten to what the source supports or demoted
    to Inference, and each disposition records its basis. AF-014 pins both the
    CHG-2026-021 tasks record and TASK-TR-002R run. Inference lines are not
    mislabelled as Fact. The AF identifier set, taxonomy attribution,
    eight-field contract, automation status value domain and two-axis split are
    unchanged; code symbols appearing in the handbook resolve inside the
    repository outside the handbook and this change; currency is updated;
    archive and template diffs are zero.
- acceptance_id: AFP-LINK-001
  test_id: TEST-AFP-LINK-001
  method: Archive-readiness reference review of the handbook.
  expected_source: openspec/changes/chg-2026-029-agent-failure-prevention/verification.md#AFP-LINK-001
  minimum_evidence: documentReview
  expected_result: >-
    The handbook contains zero relative-path references to this change's own
    directory, verified by repository search under the planning tree, while the
    factual pointer to the taxonomy registered in CHG-2026-029 design section 3
    is preserved in a form that does not depend on the change directory
    location. The AF identifier set, taxonomy attribution and two-axis split,
    eight-field contract and ordering, automation status value domain, first
    screen declarations, Fact and Inference labelling and the positive and
    negative method counts are unchanged. The remaining relative links to other
    active changes are untouched and recorded as a known limitation with its
    owning follow-up. Template, archive and CHG-2026-027 directory diffs are
    zero.
