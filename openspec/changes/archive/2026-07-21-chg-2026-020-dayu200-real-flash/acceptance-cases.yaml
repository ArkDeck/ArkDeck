    unlocked / stablePower) are present; every value is traceable to PD-002 and
    FA-001.
- acceptance_id: RF-REALFLASH-001
  test_id: TEST-RF-REALFLASH-001
  method: Maintainer-executed forward flash of a pinned images.tar.gz on the physical DAYU200.
  expected_source: openspec/changes/chg-2026-020-dayu200-real-flash/verification.md#RF-REALFLASH-001
  minimum_evidence: realHardware
  expected_result: >-
    A human maintainer flashes a pinned images.tar.gz through the design
    section-0 closed command face — entry to 0x350a Loader, ppt precondition,
    per-partition wlx, rd, and a postflight that reproduces Connected — with
    every command's argv, output and judgement recorded, member hashes verified,
    the destructive confirmation shown (userdata erase gated by an explicit
    strong confirmation), and operator, named window and recovery path on
    record. Agent destructive dispatch is zero; an aborted run is recorded
    honestly as a blocked-attempt, not a failure of this case.
