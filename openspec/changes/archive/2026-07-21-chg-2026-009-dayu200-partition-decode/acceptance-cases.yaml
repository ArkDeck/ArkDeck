schema_version: 1.0.0
change_id: CHG-2026-009-dayu200-partition-decode
change_revision: 5
platform: macos
evidence_classes:
- contract
- platform
cases:
- acceptance_id: DECODE-DAYU200-HEADLESS-001
  test_id: TEST-DECODE-DAYU200-HEADLESS-001
  method: Branch-complete unit, fault-injection and static tests over the r3 codec audit implementation.
  expected_source: openspec/changes/chg-2026-009-dayu200-partition-decode/verification.md#DECODE-DAYU200-HEADLESS-001
  minimum_evidence: contract
  expected_result: The process audit schema records the exact r3 codec
    configuration and observed runtime lifecycle; success, DecodeFailure,
    unexpected exception and cancellation paths explicitly close the codec and
    compressed remainder through finally; the receipt validator fails closed on
    missing, contradictory, over-cap or incomplete-cleanup fields and never treats
    configuration constants as runtime results. Tests prove no preset dictionary,
    codec clone/export/history view, additional application plaintext buffer or
    allocator forensic-zeroization claim; the complete existing positive and
    negative regression passes; production subprocess, network and device-mutation
    dispatch remain zero. This contract evidence uses only synthetic fixtures and
    local temporary files, does not run the collector or read the pinned archive,
    and does not satisfy or downgrade any platform acceptance case.
- acceptance_id: DECODE-DAYU200-RECEIPT-CONTRACT-001
  test_id: TEST-DECODE-DAYU200-RECEIPT-CONTRACT-001
  method: Synthetic runtime-receipt vector matrix over the collector closed validation plus source-literal pinning of the broker boolean boxing.
  expected_source: openspec/changes/chg-2026-009-dayu200-partition-decode/verification.md#DECODE-DAYU200-RECEIPT-CONTRACT-001
  minimum_evidence: contract
  expected_result: The collector validates the runtime receipt term by term and
    reports each failure with the exact field name and observed value; strictness
    is not relaxed, so JSON boolean fields must be genuine booleans and integer
    0/1 substitutes are rejected naming the field. A canonical all-true synthetic
    receipt passes every term; an integer-boxed variant fails closed naming the
    field; per-term missing and tampered vectors each produce their named error.
    A source-literal assertion pins the explicit BOOL boxing form in main.m for
    every sandbox_check-derived policy field. Headless only, with no broker
    launch, no GUI, no pinned archive, no device and no network; the three
    platform acceptance cases stay owned by TASK-PD-002 and are neither satisfied
    nor downgraded by this contract evidence.
- acceptance_id: DECODE-DAYU200-PARTITION-001
  test_id: TEST-DECODE-DAYU200-PARTITION-001
  method: Identity-gated streaming decode of parameter.txt with a closed grammar and branch-complete unit tests.
  expected_source: openspec/changes/chg-2026-009-dayu200-partition-decode/verification.md#DECODE-DAYU200-PARTITION-001
  minimum_evidence: platform
  expected_result: The decoder refuses any archive not matching the CHG-2026-003
    pinned identity; parameter.txt is located and read without extraction to
    disk; bytes in preceding member bodies may be consumed only to advance the
    single gzip/tar stream, in plaintext chunks no larger than 1 MiB; every
    application-owned reference, view or copy of the preceding non-target
    plaintext chunk is released before the next chunk is requested, and those
    bytes are never parsed, hashed, returned, logged or persisted. The only
    cross-call content-derived state permitted is one gzip-DEFLATE codec-owned
    opaque history configured with 15 DEFLATE base window bits (zlib wbits 31
    for the gzip wrapper) and bounded to 32768 bytes; the application cannot
    obtain a history/body view, clone, export, parse, hash, log, persist or
    return that state. Application-held compressed input remainder is bounded
    to 65536 bytes. The codec and remainder are destroyed immediately after
    the target or on failure/cancellation; reading stops
    after the target; raw identity/gzip pass bytes, tar header/body counts and
    bytes, application-visible retention and codec lifecycle are exactly
    audited; the mtdparts/CMDLINE grammar is closed with unknown forms failing
    explicitly rather than guessed; the evidence records the partition-name to
    offset/size/attribute mapping with S2 source citations and member hash
    references, contains no parameter.txt raw text and no archive locator, is
    annotated as valid only for the pinned image, and unit tests cover every
    grammar branch positively and negatively with a static audit proving zero
    subprocess/network/device-mutation dispatch.
- acceptance_id: DECODE-DAYU200-INPUT-BOUNDARY-001
  test_id: TEST-DECODE-DAYU200-INPUT-BOUNDARY-001
  method: Static call-target audit, descriptor-first negative tests and macOS sandbox broker evidence review.
  expected_source: openspec/changes/chg-2026-009-dayu200-partition-decode/verification.md#DECODE-DAYU200-INPUT-BOUNDARY-001
  minimum_evidence: platform
  expected_result: The production decoder accepts only a pre-opened read-only
    file descriptor or equivalent capability and contains no path-based open;
    before its first read it fstats the descriptor and rejects every non-regular
    mode with zero bytes read. The descriptor is supplied by a separately signed
    and verified macOS sandbox broker whose closed entitlements and policy exclude
    every character/block device-node namespace, including USB, serial and raw
    disks, and whose descriptor-transfer chain is recorded. Existing app sandbox
    status or a caller assertion alone is
    insufficient, and missing broker, policy, signing or transfer evidence fails
    closed. Device-mode negative tests use synthetic or mocked descriptor metadata
    and never open a real device node.
- acceptance_id: DECODE-DAYU200-RECONCILE-001
  test_id: TEST-DECODE-DAYU200-RECONCILE-001
  method: Reconciliation of the decoded mapping against the archived 17-member inventory.
  expected_source: openspec/changes/chg-2026-009-dayu200-partition-decode/verification.md#DECODE-DAYU200-RECONCILE-001
  minimum_evidence: platform
  expected_result: Every image member is mapped to its partition or explicitly
    listed as an orphan, and every partition without a member is explicitly
    listed; the reconciliation is non-authoritative, derives no flash addresses
    beyond quoting the decoded table, and makes no flashing, compatibility or
    support claim.
