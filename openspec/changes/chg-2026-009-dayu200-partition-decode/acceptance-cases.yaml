cases:
- acceptance_id: DECODE-DAYU200-PARTITION-001
  test_id: TEST-DECODE-DAYU200-PARTITION-001
  method: Identity-gated streaming decode of parameter.txt with a closed grammar and branch-complete unit tests.
  expected_source: openspec/changes/chg-2026-009-dayu200-partition-decode/verification.md#DECODE-DAYU200-PARTITION-001
  minimum_evidence: platform
  expected_result: The decoder refuses any archive not matching the CHG-2026-003
    pinned identity; parameter.txt is located and read by streaming without
    extraction to disk and without reading other member contents; the
    mtdparts/CMDLINE grammar is closed with unknown forms failing explicitly
    rather than guessed; the evidence records the partition-name to
    offset/size/attribute mapping with S2 source citations and member hash
    references, contains no parameter.txt raw text and no archive locator, is
    annotated as valid only for the pinned image, and unit tests cover every
    grammar branch positively and negatively with a static audit proving zero
    subprocess/network/device access.
- acceptance_id: DECODE-DAYU200-RECONCILE-001
  test_id: TEST-DECODE-DAYU200-RECONCILE-001
  method: Reconciliation of the decoded mapping against the archived 17-member inventory.
  expected_source: openspec/changes/chg-2026-009-dayu200-partition-decode/verification.md#DECODE-DAYU200-RECONCILE-001
  minimum_evidence: platform
  expected_result: Every image member is mapped to its partition or explicitly
    listed as an orphan, and every partition without a member is explicitly
    listed; the reconciliation is non-authoritative, derives no flash addresses
    beyond quoting the decoded table, and makes no flashing, compatibility or
    support claim.
