- acceptance_id: OBS-COUNTER-001
  test_id: TEST-OBS-COUNTER-001
  method: Mutation-verified instrumented counter contract.
  expected_source: openspec/changes/chg-2026-022-hdc-supervisor-observability/verification.md#OBS-COUNTER-001
  minimum_evidence: contract
  expected_result: >-
    Automatic lifecycle/subserver dispatch counters increment at the real
