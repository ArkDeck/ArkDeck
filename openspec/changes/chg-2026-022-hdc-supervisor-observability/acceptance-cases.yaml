---
schema_version: 1.0.0
change_id: CHG-2026-022-hdc-supervisor-observability
change_revision: 2
platform: macos
evidence_classes:
- contract
cases:
- acceptance_id: OBS-COUNTER-001
  test_id: TEST-OBS-COUNTER-001
  method: Mutation-verified instrumented counter contract.
  expected_source: openspec/changes/chg-2026-022-hdc-supervisor-observability/verification.md#OBS-COUNTER-001
  minimum_evidence: contract
  expected_result: >-
    Automatic lifecycle/subserver dispatch counters increment only after the
    unique identity-bound posix_spawn hook succeeds. Origin is derived from a
    sealed typed argv family plus an opaque Supervisor-minted confirmed or
    managed permit; callers cannot provide an origin enum/string/flag or write
    the monitor. A fake-process mutation that removes the permit must spawn
    through the same hook and make each automatic counter positive, while the
    untouched path remains zero; confirmed/managed dispatch is not counted as
    automatic and presentation mirrors the snapshot.
- acceptance_id: OBS-OWNERSHIP-001
  test_id: TEST-OBS-OWNERSHIP-001
  method: Ownership evidence-matrix contract.
  expected_source: openspec/changes/chg-2026-022-hdc-supervisor-observability/verification.md#OBS-OWNERSHIP-001
  minimum_evidence: contract
  expected_result: >-
    With all four evidence items present (pre-existing server receipt, zero
    automatic lifecycle dispatch count, generation minted from observation,
    and no active or unreconciled managed-launch provenance) production
    classifies external and exposes the basis. Missing evidence stays unknown
    or retains a live ArkDeck-managed claim; an existing managed claim cannot
    transition directly to external before explicit reconcile or retirement.
    An equivalence test proves external and unknown authorization gates remain
    identical.
- acceptance_id: OBS-ENDPOINT-001
  test_id: TEST-OBS-ENDPOINT-001
  method: Endpoint source and child-environment exposure contract.
  expected_source: openspec/changes/chg-2026-022-hdc-supervisor-observability/verification.md#OBS-ENDPOINT-001
  minimum_evidence: contract
  expected_result: >-
    The presentation exposes the endpoint source (explicit/inherited/default)
    and the child-environment injection list; the existing guarantee that the
    parent process environment is never modified keeps its assertions green.
- acceptance_id: OBS-FANOUT-001
  test_id: TEST-OBS-FANOUT-001
  method: Read-only device fan-out contract.
  expected_source: openspec/changes/chg-2026-022-hdc-supervisor-observability/verification.md#OBS-FANOUT-001
  minimum_evidence: contract
  expected_result: >-
    Device snapshots come from a separately approved and implemented
    parameterized zero-to-many read-only integration family. Production
    composition diffs appeared, unchanged and disappeared devices into the
    Supervisor fan-out and bounded presentation buffer, distinguishes an empty
    successful snapshot from unknown/failure, and issues no unregistered device
    command. Test-only snapshot injection cannot satisfy this case by itself.
- acceptance_id: OBS-APPFACE-001
  test_id: TEST-OBS-APPFACE-001
  method: Signed XCUITest over the new observation fields.
  expected_source: openspec/changes/chg-2026-022-hdc-supervisor-observability/verification.md#OBS-APPFACE-001
  minimum_evidence: contract
  expected_result: >-
    The new fields (counters, endpoint source, ownership basis, device events)
    are rendered as accessibility-readable static text with stable identifiers
    and correct value shapes; the production path contains zero fixtures.
