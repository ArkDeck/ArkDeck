    zero (green case); the presentation mirrors the snapshot; a branch constant
    or structural-absence inference does not satisfy this case.
- acceptance_id: OBS-OWNERSHIP-001
  test_id: TEST-OBS-OWNERSHIP-001
  method: Ownership evidence-matrix contract.
  expected_source: openspec/changes/chg-2026-022-hdc-supervisor-observability/verification.md#OBS-OWNERSHIP-001
  minimum_evidence: contract
  expected_result: >-
    With all three evidence items present (pre-existing server receipt, zero
    lifecycle dispatch count, generation minted from observation) production
    classifies external and exposes the basis; with any item absent it stays
    unknown; an equivalence test proves the authorization gates treat external
    and unknown identically before and after this change.
