cases:
- acceptance_id: RPT-BOUNDARY-001
  test_id: TEST-RPT-BOUNDARY-001
  method: Document review of authenticated ruleset read-back and the live ref matrix.
  expected_source: openspec/changes/chg-2026-033-ref-protection-topology/verification.md#RPT-BOUNDARY-001
  minimum_evidence: documentReview
  expected_result: >-
    The non-bypass Agent Deploy Key can create, update and delete both
    single-level and multi-level agent/** refs, while creation or update of
    ordinary refs, agentx/** and main is rejected by the intended active
    control. The ordinary-ref ruleset remains active with ~ALL,
    creation/update/deletion rules, exact exclusions for both Agent patterns
    and main, and human-only bypass.
- acceptance_id: RPT-MAIN-001
  test_id: TEST-RPT-MAIN-001
  method: Document review of authenticated main protection and the live merge pilot.
  expected_source: openspec/changes/chg-2026-033-ref-protection-topology/verification.md#RPT-MAIN-001
  minimum_evidence: documentReview
  expected_result: >-
    Main requires a pull request, one approving review, CODEOWNER review, the
    guard check from the pinned GitHub Actions app and administrator
    enforcement. Only lvye is in push restrictions, teams and apps are empty,
    force push and deletion are disabled, direct pushes fail, and lvye can
    normally squash-merge a compliant PR without choosing a bypass action.
- acceptance_id: RPT-IDENTITY-001
  test_id: TEST-RPT-IDENTITY-001
  method: Document review of credential, permission and callable-route inventories.
  expected_source: openspec/changes/chg-2026-033-ref-protection-topology/verification.md#RPT-IDENTITY-001
  minimum_evidence: documentReview
  expected_result: >-
    No Agent-reachable process, connector, browser, keychain, secret store,
    token, app session or tool can act as lvye. Every Agent identity is
    non-CODEOWNER, non-admin, non-bypass and outside main push restrictions;
    review, merge, auto-merge, main ref update and repository, branch or
    ruleset administration routes are absent or denied.
- acceptance_id: RPT-MIGRATION-001
  test_id: TEST-RPT-MIGRATION-001
  method: Document review of the ordered migration, read-backs and rollback receipt.
  expected_source: openspec/changes/chg-2026-033-ref-protection-topology/verification.md#RPT-MIGRATION-001
  minimum_evidence: documentReview
  expected_result: >-
    Exact canonical before, after and rollback JSON and hashes are
    reproducible. Main branch protection is strengthened and verified while
    the old ruleset still covers main; only then is main excluded from that
    ruleset. The direct-main negative is repeated after exclusion to prove the
    rejecting branch-protection path. Any failure restores ruleset main
    coverage first, so no interval leaves main without an active protection.
- acceptance_id: RPT-AUDIT-001
  test_id: TEST-RPT-AUDIT-001
  method: Document review of append-only supersession and dependent governance.
  expected_source: openspec/changes/chg-2026-033-ref-protection-topology/verification.md#RPT-AUDIT-001
  minimum_evidence: documentReview
  expected_result: >-
    Historical CHG-2026-027 and CHG-2026-030 evidence remains immutable and
    truthful, while append-only current-mechanism notes identify the new
    topology. Old HLR-002A OIDs, windows, payloads, hashes, scripts, ref names
    and UUIDs cannot be executed or cited as current evidence. AGENTS.md and
    enforcement.md high-level semantics remain unchanged.
