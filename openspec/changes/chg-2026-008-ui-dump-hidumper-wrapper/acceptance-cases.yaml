schema_version: 1.0.0
change_id: CHG-2026-008-ui-dump-hidumper-wrapper
change_revision: 10
platform: macos
evidence_classes:
- contract
- platform
- realHardware
cases:
- acceptance_id: INT-UD-HARNESS-001
  test_id: TEST-INT-UD-HARNESS-001
  method: Offline fake-runner contract over the closed UD capture harness.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-HARNESS-001
  minimum_evidence: contract
  expected_result: Before any Phase A/B device execution, a host-only task
    delivers scripts/ud_capture (README, capture.py, test_capture.py) replicating
    the M0B capture.py trust chain onto the runbook command surface. The closed
    allowlist mirrors the Phase A runbook argv rows verbatim for HP-0 through HP-2,
    INV-1, R1 through R3, SC-1 through SC-3 and FX-1 through FX-4; R4 remains
    intentionally absent until TASK-UD-R2-R4-SEAM-001 is independently ready; unknown
    ids are rejected by identity-checked argv building; CONNECT_KEY is accepted
    only as a same-session HP output value, WINDOW_ID only as strict ASCII
    decimal, and local paths only outside every git repository. Execution uses
    argv arrays with no host shell. Streams are written byte-exact with
    exclusive-create and 0o600, hashed per stream, capped at 4 MiB retained
    bytes with an explicit truncated flag, and every command carries a recorded
    default-120s timeout channel. Connect-key and home-path masking, one
    redacted manifest per command under the arkdeck-ud-capture-redacted-1.0.0
    schema with deterministic serialization, a fail-closed output-side
    sensitive-literal scan, and NN-id stream naming with a capture-hashes
    summary are all enforced. Fake-runner tests cover positive and negative
    paths for every command id, placeholder validation failures, masking and
    scan negatives, manifest byte parity, allowlist-README sync, and an AST
    audit proving no shell or network use; tests execute zero real hdc. Source
    commit OID and per-file SHA-256 are recorded in evidence at execution time.
    This case claims no canonical AC-DUMP PASS and does not execute any device
    capture.
- acceptance_id: INT-UD-HARNESS-ECHO-001
  test_id: TEST-INT-UD-HARNESS-ECHO-001
  method: Offline synthetic fake-runner contract over the exact FX-1 typed-path echo policy.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-HARNESS-ECHO-001
  minimum_evidence: contract
  expected_result: The merged r9 host-only task updates the full and redacted
    capture manifest schemas to
    arkdeck-ud-capture-manifest-1.1.0 and
    arkdeck-ud-capture-redacted-1.1.0. The policy accepts a validated
    LOCAL_HAP_PATH echo only in FX-1 stdout when the stream is complete,
    untruncated, and not drain-incomplete. Every generic user-path match byte
    range must be wholly contained by an exact byte-for-byte allowed path span;
    substring, prefix, dirname, sibling, case, Unicode, realpath or symlink
    alias forms never match. Deterministic per-stream facts include the policy
    id, expectedLocalInputEchoFound and unexpectedUserPathFound, while the
    original path appears only in controlled raw/full artifacts and never in a
    redacted manifest, summary, CLI text or repository evidence. A second or
    variant user path, any stderr or non-FX-1 echo, key material, truncation,
    drain incompleteness or broken redaction fails closed. Byte-exact raw
    retention, whole-stream hashing, 0o600 exclusive creation, timeout gates
    and the repository-facing sensitive-literal hard gate remain unchanged.
    Synthetic adversarial tests cover the entire positive/negative matrix,
    manifest byte parity and schema/README/runbook synchronization, and all 52
    pre-existing harness tests continue to pass. The implementation reads no
    PR 219 controlled raw or full manifest and executes zero installed HDC,
    device, network or destructive actions. This case claims no canonical
    AC-DUMP PASS and does not restore TASK-UD-CAP-MUT-001 readiness.
- acceptance_id: INT-UD-CAPTURE-MUT-001
  test_id: TEST-INT-UD-CAPTURE-MUT-001
  method: Human-operated runbook Phase A first target-build deviceMutation capture of R1 through R3.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-CAPTURE-MUT-001
  minimum_evidence: realHardware
  expected_result: This case is not executable until r3 and an independent
    readiness PR are merged fixing the dedicated non-sensitive fixture HAP tuple,
    the literal INV-1 window-inventory command, the single exact remote sidecar
    path, and the device/time window. The human maintainer personally executes
    the closed runbook command list. HP-0 through HP-2 preflight records match
    the pinned M0B HDC hash/version and prove exactly one expected DAYU200
    target; every device command carries an explicit -t whose connect key comes
    only from the same-session list-targets output; the default-target form is
    never used. Official source does not prove target output mode, so first
    target executions R1 through R3 are captureRemoteFile/deviceMutation with no
    readOnly branch and no post-hoc downgrade. Each -a payload is one array
    element; failed attempts are never retried with another boundary. The
    exact-path inventory proves the sidecar path absent before and classifies it
    after each Recipe; only a proven-owned new file is received and removed;
    global search, wildcards, recursive deletion, and overwriting are forbidden;
    unclear ownership is preserved as needsAttention. Stdout, stderr, and
    optional sidecar are separate raw origins with per-stream SHA-256, and all
    raw bytes stay outside git. The evidence set is run.md,
    the per-command redacted-manifests/ copies, capture-hashes.md, and schema-valid
    hardware-evidence.json; the validating tool path/version is recorded at
    execution time. Claimed-operator truth is attested by maintainer review and
    merge of the evidence PR. Exit 0 alone is never success; "option ... missed"
    is explicit failure; other outputs remain unknownOutput until a decision
    revision registers families. Destructive and Agent dispatch counts are zero.
    This case claims no canonical AC-DUMP PASS.
- acceptance_id: INT-UD-R2-DECISION-001
  test_id: TEST-INT-UD-R2-DECISION-001
  method: Human-offline deterministic R2 derived-fixture output-family decision review.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-R2-DECISION-001
  minimum_evidence: realHardware
  expected_result: The human maintainer processes only the proven-owned Phase A
    R2 sidecar whose whole-file SHA-256 is fixed by PR 248, using the merged
    uidump-derived-redaction-v1 transform and its fixed empty safe-literal
    allowlist. The raw is opened read-only outside every repository, while the
    derived fixture and receipt are exclusive-created and their raw-to-receipt-
    to-derived hash chain, schema, policy hashes, byte parity, replacement
    counts, and repository-sensitive scan all pass. Before commit, the
    maintainer reads the exact derived bytes and attests privacy and semantic
    meaning by PR review. A positive decision records the approved R2 argv,
    target tuple, raw/derived/receipt hashes, structural success family,
    explicit-failure precedence, otherwise-unknown rule, and deterministic
    placeholder locator/basis requiring exactly one component candidate. It
    records and reuses no exact Phase A component token. Redactor failure,
    privacy failure, absence of a repo-safe positive fixture, or zero/multiple/
    ambiguous candidates produces a truthful negative decision and leaves the
    selector seam and R4 blocked. Agent raw-read and HDC, device, network, GUI,
    and destructive dispatch counts are zero. This case claims no canonical
    AC-DUMP PASS.
- acceptance_id: INT-UD-R2-R4-SEAM-001
  test_id: TEST-INT-UD-R2-R4-SEAM-001
  method: Offline synthetic adversarial contract for same-session selection bundle and R4 harness materialization.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-R2-R4-SEAM-001
  minimum_evidence: contract
  expected_result: After a positive R2 decision is independently done and a
    separate readiness PR fixes the schemas and implementation boundary, a
    stdlib-only selector reads only a fresh, proven-owned, complete same-session
    R2 raw origin and applies the approved structural family and locator. It
    requires exactly one format-valid candidate and exclusive-creates a private
    0o600 bundle outside every repository containing the exact token, a 256-bit
    random nonce, decision id, raw hash, and session/window binding. A repo-safe
    receipt records only hashes, locator/cardinality, bundle SHA-256, and
    validation facts and contains neither token nor nonce. The capture harness
    adds R4 only through a typed bundle reference consisting of path and expected
    SHA-256, validates schema, no-follow path, mode, content hash, decision,
    fresh raw origin, session/window, and token format, then materializes
    the exact one-element -a payload internally. CLI, environment, manual token,
    and ordinary untyped-file inputs are rejected. Synthetic tests cover valid,
    zero/multiple, stale Phase A, wrong decision/raw/window/session, tamper,
    symlink/mode/path, injection, timeout/truncation, and all output-leak paths;
    every negative has zero request, process, HDC, device, and network dispatch.
    This case claims no canonical AC-DUMP PASS.
- acceptance_id: INT-UD-CAPTURE-R4-001
  test_id: TEST-INT-UD-CAPTURE-R4-001
  method: Decision-bound human runbook Phase B componentDetail deviceMutation capture.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-CAPTURE-R4-001
  minimum_evidence: realHardware
  expected_result: This case remains blocked until Phase A is done, a positive
    R2 decision has registered success/failure/unknown structural families and
    a deterministic candidate locator, the same-session selector/R4 harness
    seam is done, and an independent R4 readiness PR is merged. A fresh Phase B
    session runs R2, selects exactly one candidate into the private bundle, and
    executes R4 without restarting or reinstalling the fixture, mutating UI
    state, or issuing an unlisted device command between R2 and R4. The Phase A
    token is never reused, and COMPONENT_ID is never accepted from CLI,
    environment, ad-hoc typing, or an ordinary file. Unknown, truncated,
    failed, zero/multiple, drifted, or tampered selection keeps R4 dispatch at
    zero. R4 uses the exact one-element payload with the same HP preflight,
    explicit -t, conservative deviceMutation classification, exact-path
    inventory, owned-only cleanup, separate raw origins, and raw-outside-git
    privacy gates as Phase A. Evidence adds the decision/seam OIDs and hashes,
    fresh R2 raw hash, repo-safe selection receipt, and private-bundle SHA-256;
    exact token, nonce, and bundle bytes do not enter git. Schema-valid
    hardware-evidence.json operator truth is attested by maintainer PR review.
    Destructive and Agent dispatch counts are zero. This case claims no
    canonical AC-DUMP PASS.
- acceptance_id: INT-UD-REDACTOR-001
  test_id: TEST-INT-UD-REDACTOR-001
  method: Offline deterministic and fail-closed UI Dump derived-golden redaction contract.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-REDACTOR-001
  minimum_evidence: contract
  expected_result: Before TASK-UD-001 becomes ready, an independent host-only
    task implements and fixes the uidump-derived-redaction-v1 transform source,
    versioned algorithm manifest, maintainer-approved safe-literal allowlist,
    redaction-receipt schema, tests, and README under scripts/ui_dump_redaction.
    The transform accepts only path tokens, rejects input whose measured SHA-256
    differs from --expected-input-sha256, opens raw read-only and never modifies
    it, and requires output and receipt to not pre-exist. The algorithm manifest
    fixes strict UTF-8, line-ending normalization, token/line grammar, typed
    ordinal placeholders, ordering, escaping, duplicate handling, resource
    limits, and error codes; unknown, invalid-UTF-8, control, bidi, confusable,
    or unclassified tokens and lines fail closed. Every safe literal is
    individually maintainer-approved structural syntax; package, ability, page,
    window, component, path, user or device identifiers, and page text can never
    enter the allowlist by pattern, prefix, or heuristic. An output-side
    sensitive-literal scan hard-fails before producing derived output. The
    receipt records algorithm/manifest/allowlist hashes, raw and derived
    hash/size, replacement counts, the replay command line, and completedAt.
    Synthetic adversarial and property tests cover the negative matrix and
    byte-determinism of repeated runs without touching real raw, HDC, device,
    or network. Source hashes are recorded in evidence at execution time. This
    case does not close canonical AC-DUMP-008-01.
- acceptance_id: INT-UD-WRAPPER-001
  test_id: TEST-INT-UD-WRAPPER-001
  method: Contract tests over the fixed wrapper with adversarial fake hidumper outputs.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-WRAPPER-001
  minimum_evidence: contract
  expected_result: After the two human capture tasks and the decision revision
    have declared the exact argv boundary and registered success, failure, and
    unknown output families, the wrapper pins one fixed argv form per ui-dump
    recipe. The implementation must not invent a marker or use a self-authored
    fake as target-build evidence. Success is judged only by the registered
    output family, never by exit code; observed error-style outputs such as
    "option ... missed" with exit 0 are explicit failures; an unregistered or
    marker-absent output is unknownOutput. Only text-marker or
    structural-parser families with repo-safe synthetic/derived positive
    fixtures may be registered; raw byte-fingerprint/digest families are
    rejected. Contract tests cover every permitted declared family in a clean
    checkout through the exact production semantic-evaluator path and invoke no
    real hdc. REQ-DUMP-003 and canonical TEST-AC-DUMP-003-01 additionally
    require missing, empty, malformed, and injection-shaped component IDs to
    fail before ProcessRequest creation, with request and dispatch counts both
    zero.
- acceptance_id: INT-UD-GOLDEN-001
  test_id: TEST-INT-UD-GOLDEN-001
  method: Deterministic derived hidumper golden fixtures registered from controlled human capture hashes.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-GOLDEN-001
  minimum_evidence: platform
  expected_result: Each repository golden is explicitly derived, never raw, from
    a human-operated approved Recipe capture whose whole-stream raw hash is
    recorded while its sensitive bytes remain outside git. TASK-UD-REDACTOR-001
    is already done; TASK-UD-001 cannot read raw and cannot modify the redaction
    toolchain. Every committed golden carries its redaction receipt, where the
    committed bytes' SHA-256 equals the receipt's derived hash, the receipt's
    raw hash equals the corresponding capture-manifest whole-stream hash, and
    the algorithm/manifest/allowlist hashes match the TASK-UD-REDACTOR-001
    evidence. The maintainer reads the exact derived bytes in the golden PR;
    merge of that PR is the privacy-review attestation. The derived bytes are
    pinned byte-exact with .gitattributes before commit and match registry,
    integration profile/lock, and Bundle resources; a sensitive-literal scan
    over committed fixtures finds zero hits. A missing receipt, a broken hash
    link, or unreviewed derived bytes fails the case. Unknown tokens or lines
    fail closed; the repository contains no raw UI bytes or sensitive page
    text, package, ability, window, component, path, or user identifiers. No
    raw/derived byte equality, compatibility, or support claim is made; help
    and service-list outputs cannot substitute for Recipe output.
