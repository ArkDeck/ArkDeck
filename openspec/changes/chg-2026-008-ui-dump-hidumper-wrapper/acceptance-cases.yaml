schema_version: 1.0.0
change_id: CHG-2026-008-ui-dump-hidumper-wrapper
change_revision: 3
platform: macos
evidence_classes:
- contract
- platform
- realHardware
cases:
- acceptance_id: INT-UD-PREFLIGHT-001
  test_id: TEST-INT-UD-PREFLIGHT-001
  method: Human-operated supervised existing-server and durable CurrentDeviceBinding preflight.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-PREFLIGHT-001
  minimum_evidence: realHardware
  expected_result: The production host-wide supervisor first proves an already
    existing HDC server through the pinned commandless server-identity and
    generation observation. Exact endpoint, process/start identity, executable,
    versions, ownership, and generation are durably stored and revalidated;
    absent or unknown server state and any drift produce zero HDC dispatch and
    no lifecycle action. A registered no-start discovery produces candidates,
    the human physically selects the device, and the production Core workflow
    durably appends bindingCandidate and bindingConfirmed before any
    device-scoped command. The repo-safe receipt pins session/job, a positive
    binding revision, binding event/hash, identity hash, and server/toolchain
    snapshot without connect key or serial. The harness accepts only receipt ID
    plus fixed revision, replays the production durable store, and materializes
    -t internally; operator, default-target, stale, mismatch, or substituted
    connect-key paths have intent/request/process counts zero. A human-attested
    hardware-evidence.json names this acceptance ID, contains the same positive
    device.bindingRevision, and passes schema plus semantic validation.
- acceptance_id: INT-UD-CAPTURE-MUT-001
  test_id: TEST-INT-UD-CAPTURE-MUT-001
  method: Human-authorized first target-build deviceMutation capture of all four Recipes.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-CAPTURE-MUT-001
  minimum_evidence: realHardware
  expected_result: This case is not executable until the supervised preflight
    task is done and a later approved readiness revision fixes a dedicated
    non-sensitive fixture, registered typed window inventory, exact owned remote
    path, and durable confirmation scope. Official source does not prove target
    output mode, so first target executions R1 through R4 are all
    captureRemoteFile/deviceMutation; no readOnly Recipe branch exists. Every
    intent loads the fixed positive CurrentDeviceBinding revision from the
    production durable store and revalidates the pinned server generation before
    and after dispatch. Confirmation covers binding, server, fixture, exact argv,
    path, inventory, receive, and cleanup. Pre-existing or unowned paths are
    never overwritten or removed; stdout, stderr, and optional sidecar origins
    stay separate outside git; cleanup targets only the proven owned path; global
    search, wildcard, and recursive deletion are forbidden. The human-attested
    hardware-evidence.json records the same binding revision, server tuple,
    exact acceptance/step kinds, and artifact hashes and passes schema plus
    semantic validation. Until all gates close, R1 through R4 and ad-hoc INV-1
    dispatch counts are zero; destructive and Agent dispatch counts remain zero.
- acceptance_id: INT-UD-WRAPPER-001
  test_id: TEST-INT-UD-WRAPPER-001
  method: Contract tests over the fixed wrapper with adversarial fake hidumper outputs.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-WRAPPER-001
  minimum_evidence: contract
  expected_result: After an approved target-build Recipe capture and decision
    revision have declared the exact argv boundary and registered success,
    failure, and unknown output families, the wrapper pins one fixed argv form
    per ui-dump recipe. The implementation must not invent a marker or use a
    self-authored fake as target-build evidence. Success is judged only by the
    registered output family, never by exit code; observed error-style outputs
    such as "option ... missed" with exit 0 are explicit failures; an
    unregistered or marker-absent output is unknownOutput. Contract tests cover
    every declared family and invoke no real hdc. REQ-DUMP-003 and canonical
    TEST-AC-DUMP-003-01 additionally require missing, empty, malformed, and
    injection-shaped component IDs to fail before ProcessRequest creation,
    with request and dispatch counts both zero.
- acceptance_id: INT-UD-GOLDEN-001
  test_id: TEST-INT-UD-GOLDEN-001
  method: Deterministic derived hidumper golden fixtures registered from controlled human capture hashes.
  expected_source: openspec/changes/chg-2026-008-ui-dump-hidumper-wrapper/verification.md#INT-UD-GOLDEN-001
  minimum_evidence: platform
  expected_result: Each repository golden is explicitly derived, never raw,
    from a human-operated approved Recipe capture whose whole-stream raw hash is
    recorded while its sensitive bytes remain outside git. A controlled replay
    of uidump-derived-redaction-v1 produces the registered derived hash. Its
    receipt binds the algorithm/source and safe-literal allowlist hashes, raw
    and derived hashes, replacement counts, and human privacy review. Unknown
    tokens or lines fail closed; the repository contains no raw UI bytes or
    sensitive page text, package, ability, window, component, path, or user
    identifiers. The derived bytes are pinned byte-exact with .gitattributes
    before commit and match registry, integration profile/lock, and Bundle
    resources. No raw/derived byte equality, compatibility, or support claim is
    made; help and service-list outputs cannot substitute for Recipe output.
