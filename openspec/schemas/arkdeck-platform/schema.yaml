name: arkdeck-platform
version: 1
description: ArkDeck platform or implementation-only change without behavior delta
artifacts:
  - id: proposal
    generates: proposal.md
    description: Why, scope, impact, and approval target
    template: proposal.md
    instruction: Create a proposal without claiming approval.
    requires: []
  - id: scope
    generates: scope.yaml
    description: Exact immutable Requirement and Acceptance scope
    template: scope.yaml
    instruction: Declare the exact Requirement/AC union that all Task packets must cover.
    requires: [proposal]
  - id: impact
    generates: spec-impact.md
    description: Proof that Core behavior/AC/contracts are unchanged
    template: impact.md
    instruction: Enumerate affected specs and prove no normative delta.
    requires: [proposal, scope]
  - id: design
    generates: design.md
    description: Platform/implementation design
    template: design.md
    instruction: Map platform ports to pinned Core requirements.
    requires: [proposal, scope, impact]
  - id: verification
    generates: verification.md
    description: Acceptance methods and evidence plan/results
    template: verification.md
    instruction: Map all applicable AC and platform Port evidence.
    requires: [impact, design]
  - id: acceptance_cases
    generates: acceptance-cases.yaml
    description: Canonical change-local platform acceptance cases
    template: acceptance-cases.yaml
    instruction: Declare every platform-local case with a stable ID, binary method, expected source and minimum evidence; use an empty cases list when the change adds no local case.
    requires: [scope, verification]
  - id: review
    generates: review.md
    description: Pre-task platform-impact, design, and verification review
    template: review.md
    instruction: Fail on invalid approval, Core override, gaps, or untestable AC.
    requires: [impact, design, verification, acceptance_cases]
  - id: tasks
    generates: tasks.md
    description: Immutable executable task packets; runtime claims are sidecars
    template: tasks.md
    instruction: Create task packets only; do not mark ready without valid approval.
    requires: [impact, design, verification, acceptance_cases, review]
  - id: ready_review
    generates: ready-review.md
    description: Pre-approval structural, pinning, and execution-readiness review
    template: ready-review.md
    instruction: Review immutable packet structure, planned approval subjects, pins and verification mappings without claiming that post-lock approvals already exist.
    requires: [tasks, review]
  - id: change_lock
    generates: change-lock.yaml
    description: Immutable hash manifest for normative change inputs
    template: change-lock.yaml
    instruction: Hash proposal, scope, impact, design, verification, canonical acceptance registry, review and ready-review; exclude the task index and independently approved Task packets; do not claim approval.
    requires: [tasks, review, ready_review]
apply:
  requires: [tasks, review, ready_review, change_lock, verification]
  tracks: tasks.md
