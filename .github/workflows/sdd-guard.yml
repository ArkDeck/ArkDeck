name: SDD Guard

# V2 git-native 治理:CI 只做只读一致性校验(specs/AC 索引/changes/locks)。
# 授权语义由受保护 main + CODEOWNER PR review 承担;本 workflow 不持有任何 secret。

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install -r scripts/requirements-sdd.txt

      - name: SDD consistency check
        env:
          ARKDECK_PYTHON: python
        run: ./scripts/check-sdd.sh

  allowed-paths:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: PR allowed-paths contract tests
        run: python scripts/test_check_pr_paths.py

      - name: Check PR diff against declared task
        # Read untrusted title/body/head-ref from GitHub's JSON event file inside
        # Python. Never interpolate those fields into the host shell.
        run: python scripts/check_pr_paths.py --repo-root "$GITHUB_WORKSPACE" --event "$GITHUB_EVENT_PATH"
