name: Swift CI

# 探针形态(丢弃分支专用):枚举 macos-26 镜像的 Xcode/Swift 清单,为
# MECH-001 readiness r2 重钉提供事实。不跑测试。
on:
  push:
    branches: ["agent/**"]

permissions:
  contents: read

jobs:
  swift:
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Enumerate Xcodes
        run: |
          sw_vers
          ls -d /Applications/Xcode*.app
          for x in /Applications/Xcode_26*.app; do
            echo "== $x"; "$x/Contents/Developer/usr/bin/swift" --version 2>/dev/null | head -1 || true
          done
